            - generic [ref=e230]:
              - generic [ref=e231]:
                - heading "Introduction" [level=2] [ref=e232]
                - paragraph [ref=e233]:
                  - text: The ability to manipulate neural activity without performing highly invasive surgical procedures would represent a major breakthrough in medicine (
                  - link "Musk and Neuralink, 2019" [ref=e235] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Perry, 2020" [ref=e237] [cursor=pointer]:
                    - /url: "#"
                  - text: ). This type of technology would enable neurostimulation of deep tissue structures, such as the subthalamic nucleus to treat symptoms of Parkinson’s diseases or spinal dorsal columns to treat refractory pain (
                  - link "Lempka and Patil, 2018" [ref=e239] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Lozano et al., 2019" [ref=e241] [cursor=pointer]:
                    - /url: "#"
                  - text: ), without requiring invasive surgery. This capability would dramatically reduce costs and complications. In fact, it may even improve clinical outcomes by enabling more selective stimulation. Unfortunately, the realization of this technology is precluded by the physical laws governing the penetration of electromagnetic radiation within biological tissues. The electric potentials generated by electric currents delivered outside the skin rapidly decay with distance from the sources (
                  - link "Faria et al., 2011" [ref=e243] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Plonsey and Barr, 2007" [ref=e245] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rush and Driscoll, 1968" [ref=e247] [cursor=pointer]:
                    - /url: "#"
                  - text: ). As neural excitability is directly proportional to the strength of the extracellular electric potential (
                  - link "McNeal, 1976" [ref=e249] [cursor=pointer]:
                    - /url: "#"
                  - text: ), it has not been possible to use non-invasive electric stimulation to activate deep regions without activating superficial neurons.
                - paragraph [ref=e250]:
                  - text: However, a recent study proposed that the low-pass filtering property of the neural membrane may be leveraged to provide non-invasive stimulation of deep brain regions (
                  - link "Grossman et al., 2017" [ref=e252] [cursor=pointer]:
                    - /url: "#"
                  - text: ). This intrinsic low-pass filtering causes the neural membrane to be more sensitive to low-frequency oscillating fields relative to high-frequency fields. Hence, it was proposed that two electrode pairs could noninvasively stimulate deep brain structures by delivering high-frequency currents with a small frequency offset. At a specific region in space, superposition of the high-frequency currents would create a low-frequency pattern of amplitude modulation (AM). Within this region, neurons would respond to this low-frequency modulation due to the low-pass filtering properties of the neural membrane. This approach was termed temporal interference (TI) (
                  - link "Grossman et al., 2017" [ref=e254] [cursor=pointer]:
                    - /url: "#"
                  - text: ) and had been proposed decades earlier under different names, such as interferential current therapy and interferential stimulation (
                  - link "Agharezaee and Mahnam, 2015" [ref=e256] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Goats, 1990" [ref=e258] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Translating these pivotal studies into successful clinical therapies requires an understanding of how TI fields are modulated within the human body (
                  - link "Cao and Grover, 2020" [ref=e260] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Karimi et al., 2019" [ref=e262] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rampersad et al., 2019" [ref=e264] [cursor=pointer]:
                    - /url: "#"
                  - text: ). In consequence, there is an ongoing healthy debate examining the clinical utility of this technology when considering the challenge of inefficient current penetration in large structures, such as the human head (
                  - link "Cao and Grover, 2018" [ref=e266] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Howell and McIntyre, 2020" [ref=e268] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rampersad et al., 2019" [ref=e270] [cursor=pointer]:
                    - /url: "#"
                  - text: ).
                - paragraph [ref=e271]:
                  - text: As part of this debate, we aimed at addressing the fundamental physics underlying TI stimulation. In essence, the intriguing TI concept is based on two logically related assumptions (
                  - link "Figure 1" [ref=e272] [cursor=pointer]:
                    - /url: "#fig1"
                  - text: "):"
                  - list [ref=e273]:
                    - listitem [ref=e274]:
                      - generic [ref=e275]: (1)
                      - paragraph [ref=e277]: "Neural membranes do not respond to high-frequency stimulation, or more precisely, they are more sensitive to slow oscillating fields, and in consequence:"
                    - listitem [ref=e278]:
                      - generic [ref=e279]: (2)
                      - paragraph [ref=e281]: Neurons will only respond to TI stimulation within the spatial region where the electric field is modulated at the slower beat frequency (i.e., the small frequency offset between the two waveforms).
                - figure "Figure 1 Concept of TI Stimulation Show full caption  Figure viewer" [ref=e283]:
                  - link " Figure 1 Concept of TI Stimulation Two pairs of scalp electrodes (I1 and I2) apply high-frequency currents at a small frequency difference that generate oscillating electric fields within the brain (E1 and E2). At a certain region, superposition of these fields will lead to low-frequency AM (E1+E2). It is hypothesized that TI stimulation exclusively activates neurons in deep brain regions without affecting superficial areas. This approach assumes that superficial neurons will not respond to the high-frequency stimulation (E1 or E2) because of their intrinsic low-pass filtering properties (Assumption 1). Deep neurons will respond to TI stimulation because the interfering electrical fields contain low-frequency oscillating elements (E1+E2) (Assumption 2). However, research has demonstrated that neurons do respond to high-frequency electric fields (Challenging the assumptions)." [ref=e284] [cursor=pointer]:
                    - /url: /cms/10.1016/j.cels.2020.10.004/asset/a45073c5-5757-4e9a-99d0-ab02412ae7f7/main.assets/gr1_lrg.jpg
                    - text: 
                    - img "Figure 1 Concept of TI Stimulation Two pairs of scalp electrodes (I1 and I2) apply high-frequency currents at a small frequency difference that generate oscillating electric fields within the brain (E1 and E2). At a certain region, superposition of these fields will lead to low-frequency AM (E1+E2). It is hypothesized that TI stimulation exclusively activates neurons in deep brain regions without affecting superficial areas. This approach assumes that superficial neurons will not respond to the high-frequency stimulation (E1 or E2) because of their intrinsic low-pass filtering properties (Assumption 1). Deep neurons will respond to TI stimulation because the interfering electrical fields contain low-frequency oscillating elements (E1+E2) (Assumption 2). However, research has demonstrated that neurons do respond to high-frequency electric fields (Challenging the assumptions)." [ref=e285]
                  - generic [ref=e286]:
                    - generic [ref=e287]: Figure 1 Concept of TI Stimulation
                    - generic [ref=e289]:
                      - button "Show full caption " [ref=e290] [cursor=pointer]:
                        - text: Show full caption
                        - generic [ref=e291]: 
                      - button "Figure viewer" [ref=e292]
                - paragraph [ref=e293]:
                  - text: However, both of these assumptions are either oversimplifications or incorrect. Decades of research has shown that neural membranes do respond to high-frequency fields, albeit the dynamics become complex and lead to phenomena, such as conduction block (i.e., inhibition of action potential propagation) (
                  - link "Bhadra et al., 2007" [ref=e295] [cursor=pointer]:
                    - /url: "#"
                  - text: ","
                  - link "Reference 2019" [ref=e297] [cursor=pointer]:
                    - /url: "#"
                    - text: "2019"
                  - text: ;
                  - link "Crosby et al., 2017" [ref=e299] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Joseph and Butera, 2009" [ref=e301] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Joseph et al., 2007" [ref=e303] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Kilgore and Bhadra, 2006" [ref=e305] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Tai et al., 2005" [ref=e307] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Zhang et al., 2006a" [ref=e309] [cursor=pointer]:
                    - /url: "#"
                  - text: ","
                  - link "2006b" [ref=e311] [cursor=pointer]:
                    - /url: "#"
                  - text: ). This research has also shown that axons are more susceptible to polarization from (invasive and non-invasive) electric stimulation (
                  - link "Aberra et al., 2018" [ref=e313] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Chakraborty et al., 2018" [ref=e315] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Hause, 1975" [ref=e317] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Howell and McIntyre, 2020" [ref=e319] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "McIntyre et al., 2004" [ref=e321] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rahman et al., 2013" [ref=e323] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Ranck, 1975" [ref=e325] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Wongsarnpigoon and Grill, 2012" [ref=e327] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Specifically, action potentials can be initiated at the axon terminals, in correspondence to maxima of the electric field (
                  - link "Chakraborty et al., 2018" [ref=e329] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Hause, 1975" [ref=e331] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Hentall, 1985" [ref=e333] [cursor=pointer]:
                    - /url: "#"
                  - text: ). In contrast, along the rest of the axon, action potential initiation sites correspond to peaks of the “activating function” (i.e., second-order spatial derivative of the electric potential along the axon) (
                  - link "Rattay, 1986" [ref=e335] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Therefore, excitation depends on multiple properties and orientation to the induced fields. Characterization of how these physical properties apply to TI stimulation is extremely important to understand and predict accurate neural activation profiles.
                - paragraph [ref=e336]:
                  - text: To address these important points, we used established physics to study TI within a simple theoretical framework. Our results support the experimental evidence that it is possible to excite distant neural structures in phase with the low-frequency envelope of the TI stimulus (
                  - link "Grossman et al., 2017" [ref=e338] [cursor=pointer]:
                    - /url: "#"
                  - text: ). However, our results also show that the same mechanism enabling TI-driven excitation may also generate conduction block in off-target neural structures. These results highlight the need for precise control experiments in TI studies.
              - generic [ref=e339]:
                - heading "Results" [level=2] [ref=e340]
                - generic [ref=e341]:
                  - heading "Fundamental Representation of the Physics of TI" [level=3] [ref=e342]
                  - paragraph [ref=e343]:
                    - text: Studying current propagation and neural activation with TI in complex geometries prevents the emergence of general patterns, such as the sensitivity of neurons to field orientation. Furthermore, it requires numerical solutions of Maxwell’s equations, which may further hamper prediction accuracy (
                    - link "Howell et al., 2014" [ref=e345] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Pelot et al., 2018" [ref=e347] [cursor=pointer]:
                      - /url: "#"
                    - text: ). We reasoned that studying TI within a simple geometry would allow for straightforward characterization of electric field and neural excitability properties that could be generalized. Therefore, we considered a set of parallel axons in an infinite homogeneous space traversing temporally interfering fields generated by two pairs of current sources oriented parallel to the axons (
                    - link "Figure 2" [ref=e348] [cursor=pointer]:
                      - /url: "#fig2"
                    - text: A). With this setup, we were able to utilize analytic solutions of Maxwell’s equations and straightforward characterization of the neural membrane responses in relation to field orientation. This simple system can be viewed as a prototype of a clinical system for targeting white matter tracts deep within the brain, axons within a peripheral nerve, or longitudinal dorsal column axons in the spinal cord.
                  - figure "Figure 2 Fundamental Representation of the Physics of TI Show full caption  Figure viewer" [ref=e350]:
                    - link [ref=e351] [cursor=pointer]:
                      - /url: /cms/10.1016/j.cels.2020.10.004/asset/d4598de3-b960-4f84-962f-95a51630a992/main.assets/gr2_lrg.jpg
                      - text: 
                      - img [ref=e352]
                    - generic [ref=e353]:
                      - generic [ref=e354]: Figure 2 Fundamental Representation of the Physics of TI
