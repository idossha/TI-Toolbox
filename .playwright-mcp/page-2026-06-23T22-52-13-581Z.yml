                    - paragraph [ref=e5019]:
                      - text: It should be noted that the optimum TI frequency changed during the sensitivity analysis when we varied the time constants of the gating variable. The optimum TI frequency depends heavily on the time constant of the potassium channel, which is known to affect resonance properties of neurons (
                      - link "Hutcheon and Yarom, 2000" [ref=e5021] [cursor=pointer]:
                        - /url: "#"
                      - text: ). Indeed, during the sensitivity analysis (
                      - link "Figures 6" [ref=e5022] [cursor=pointer]:
                        - /url: "#fig6"
                      - text: and
                      - link "S4" [ref=e5023] [cursor=pointer]:
                        - /url: "#mmc1"
                      - text: ), -50%, -25%, +25% and +50% change in the potassium channel time constant (
                      - generic "tau Subscript s" [ref=e5024]:
                        - generic [ref=e5027]:
                          - generic [ref=e5029]: 𝜏
                          - generic [ref=e5032]: 𝑠
                      - text: ) changes the optimum beat frequency from 5 Hz to 10 Hz, 6Hz, 4 Hz, and 3 Hz, respectively. These results are consistent with where resonance is expected to occur (between
                      - generic "1 divided by 2 pi tau Subscript s" [ref=e5033]:
                        - generic [ref=e5035]:
                          - generic [ref=e5037]: "1"
                          - generic [ref=e5039]: /
                          - generic [ref=e5040]:
                            - generic [ref=e5042]: "2"
                            - generic [ref=e5044]: 𝜋
                            - generic [ref=e5045]:
                              - generic [ref=e5047]: 𝜏
                              - generic [ref=e5050]: 𝑠
                      - text: and
                      - generic "1 divided by 2 pi tau Subscript m e m b r a n e" [ref=e5051]:
                        - generic [ref=e5053]:
                          - generic [ref=e5055]: "1"
                          - generic [ref=e5057]: /
                          - generic [ref=e5058]:
                            - generic [ref=e5060]: "2"
                            - generic [ref=e5062]: 𝜋
                            - generic [ref=e5063]:
                              - generic [ref=e5065]: 𝜏
                              - generic [ref=e5067]:
                                - generic [ref=e5069]: 𝑚
                                - generic [ref=e5071]: 𝑒
                                - generic [ref=e5073]: 𝑚
                                - generic [ref=e5075]: 𝑏
                                - generic [ref=e5077]: 𝑟
                                - generic [ref=e5079]: 𝑎
                                - generic [ref=e5081]: 𝑛
                                - generic [ref=e5083]: 𝑒
                      - text: ) (
                      - link "Hutcheon and Yarom, 2000" [ref=e5085] [cursor=pointer]:
                        - /url: "#"
                      - text: ). Moreover, the frequency range for our axon model is in line with values reported in the literature for somata of different neurons. For example, rat hippocampal neurons show a wide range of resonance frequencies roughly between 1-12 Hz (
                      - link "Hu et al., 2009" [ref=e5087] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Narayanan and Johnston, 2007" [ref=e5089] [cursor=pointer]:
                        - /url: "#"
                      - text: ). Also, a resonance frequency of 2 Hz has been reported for layer 5 neocortical pyramidal neurons (
                      - link "Dwyer et al., 2012" [ref=e5091] [cursor=pointer]:
                        - /url: "#"
                      - text: ) and neocortical layer 2–3 pyramidal neurons have been shown to have resonance frequencies in the range of 3-12 Hz (
                      - link "Higgs and Spain, 2009" [ref=e5093] [cursor=pointer]:
                        - /url: "#"
                      - text: ). Moreover, changing the time constant resulted in changes in the activation threshold. Hence, for the sensitivity analysis, in addition to using the optimum beat frequency, we used the activation threshold for each set of new parameters (
                      - link "Figures 6" [ref=e5094] [cursor=pointer]:
                        - /url: "#fig6"
                      - text: C, 6D,
                      - link "S3" [ref=e5095] [cursor=pointer]:
                        - /url: "#mmc1"
                      - text: ", and"
                      - link "S4" [ref=e5096] [cursor=pointer]:
                        - /url: "#mmc1"
                      - text: ).
                  - generic [ref=e5097]:
                    - heading "Model Implementation" [level=4] [ref=e5098]
                    - paragraph [ref=e5099]:
                      - text: To calculate the response of myelinated axons to extracellular TI stimulation, we used the NEURON simulation software (v7.7) with the Python programming language (
                      - link "Hines and Carnevale, 1997" [ref=e5101] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Hines et al., 2009" [ref=e5103] [cursor=pointer]:
                        - /url: "#"
                      - text: ). At each time step and at the center location of each axon compartment, we calculated the total extracellular voltage from the TI stimulation using
                      - link "Equations 1" [ref=e5104] [cursor=pointer]:
                        - /url: "#fd1"
                      - text: and
                      - link "11" [ref=e5105] [cursor=pointer]:
                        - /url: "#fd11"
                      - text: . We applied these voltages to the axons using NEURON’s extracellular mechanism. We calculated the model solutions using NEURON’s backward Euler implicit integration method with a fixed time step of 5 μs. We ran simulations for a total duration of ten beats and defined the activation threshold as the minimum current that resulted in at least a single action potential during each beat. To find the activation thresholds, we used a binary search with a relative error of 0.1%. We used carrier frequencies of 1, 2, and 4 kHz and tested for beat frequencies of 1-50 Hz in steps of 1 Hz. We assessed both the effects of TI stimulation at the axon terminal (by placing the end node, Node 100, at x=0 mm) and stimulation near the middle of the axon (by placing the center node, Node 50, at x=0 mm).
                    - paragraph [ref=e5106]:
                      - text: We also assessed the influence of boundary conditions, which can affect the transmembrane voltage solutions near axon terminals (
                      - link "Rubinstein, 1993" [ref=e5108] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Wongsarnpigoon and Grill, 2012" [ref=e5110] [cursor=pointer]:
                        - /url: "#"
                      - text: ). We utilized the standard “sealed end” boundary condition in which all of the current at the terminal nodes of Ranvier flowed through the radial membrane sections (axial current was zero) (
                      - link "Rubinstein, 1993" [ref=e5112] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Tranchina and Nicholson, 1986" [ref=e5114] [cursor=pointer]:
                        - /url: "#"
                      - text: ). To assess the effect of this boundary condition, we increased the surface area of the terminal nodes to include the membrane at the very end of the cylindrical compartment. We also ran simulations in which we removed active properties from the terminal nodes so that they only contained passive properties. We then assessed the changes in our model predictions by performing the same analysis described in
                      - link "Figure 6" [ref=e5115] [cursor=pointer]:
                        - /url: "#fig6"
                      - text: for TI stimulation applied using a 2 kHz carrier frequency and a 5 Hz beat frequency. For stimulation applied near the end of the axon (Node 100 at x=0 mm), we observed a 18.7% decrease and a 135% increase in the activation thresholds for the increased surface area nodes and passive nodes, respectively. We observed no changes in the activation thresholds for stimulation applied near the middle of the axon (Node 50 at x=0 mm). Although, we did observe significant changes in the stimulation thresholds, the qualitative trends were similar for all terminal conditions in which we still observed the “sandwich” response pattern (data not shown). Because the axon terminals are highly excitable, additional experimental work is necessary to characterize the geometric and electrical properties of axon terminals and how these properties influence the neural response to extracellular electrical stimulation (
                      - link "Wongsarnpigoon and Grill, 2012" [ref=e5117] [cursor=pointer]:
                        - /url: "#"
                      - text: ).
