                  - paragraph [ref=e510]:
                    - text: To calculate the neural response to TI stimulation, we then applied these spatiotemporal voltages to a multicompartment axon model that utilized the standard Hodgkin-Huxley formalism (
                    - link "Figure 2" [ref=e511] [cursor=pointer]:
                      - /url: "#fig2"
