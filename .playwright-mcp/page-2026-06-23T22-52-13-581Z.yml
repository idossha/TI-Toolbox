                - generic [ref=e515]:
                  - heading "Neural Membranes Must Rectify the Electric Potential to Generate Extrinsic Neural Activity" [level=3] [ref=e516]
                  - paragraph [ref=e517]:
                    - text: At an equal distance between the electrode pairs, the TI voltage waveform showed a clear low-frequency envelope (
                    - link "Figures 2" [ref=e518] [cursor=pointer]:
                      - /url: "#fig2"
                    - text: C and
                    - link "3" [ref=e519] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: A). Development of TI was driven by the hypothesis that neurons could respond to this low-frequency oscillating envelope rather than to the high-frequency stimuli. However, being the sum of two sinusoidal fields, the TI stimulus waveform only contains high-frequency content (“TI stimulation” power spectrum in
                    - link "Figure 3" [ref=e520] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: A). Neural membranes are known to have passive, low-pass filtering properties because of the capacitive-resistive properties of the lipid bilayer membrane (
                    - link "Hutcheon and Yarom, 2000" [ref=e522] [cursor=pointer]:
                      - /url: "#"
                    - text: ). However, a simple low-pass filter only reduces the power of the high-frequency components, as no low-frequency components are actually present in the stimulus (“low-pass filter” power spectrum in
                    - link "Figure 3" [ref=e523] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: B). Low-pass filtering alone cannot extract this envelope because the low-frequency and high-frequency oscillating components of the stimulus are multiplied by each other (see
                    - link "Equation 12" [ref=e524] [cursor=pointer]:
                      - /url: "#fd12"
                    - text: in the
                    - link "STAR Methods" [ref=e525] [cursor=pointer]:
                      - /url: "#sec-4"
                    - text: ) and not summed (
                    - link "Oppenheim et al., 1968" [ref=e527] [cursor=pointer]:
                      - /url: "#"
                    - text: ). Therefore, despite previous claims (
                    - link "Grossman et al., 2017" [ref=e529] [cursor=pointer]:
                      - /url: "#"
                    - text: ), the low-pass filtering properties of neurons are unlikely to be the underlying mechanism for TI stimulation.
                  - figure "Figure 3 Neural Membranes must Rectify the Electric Potential to Generate Extrinsic Neural Activity Show full caption  Figure viewer" [ref=e531]:
                    - link [ref=e532] [cursor=pointer]:
                      - /url: /cms/10.1016/j.cels.2020.10.004/asset/a86b6296-816e-4e77-95e7-7334bdea5f37/main.assets/gr3_lrg.jpg
                      - text: 
                      - img [ref=e533]
                    - generic [ref=e534]:
                      - generic [ref=e535]: Figure 3 Neural Membranes must Rectify the Electric Potential to Generate Extrinsic Neural Activity
                      - generic [ref=e537]:
                        - button "Show full caption " [ref=e538] [cursor=pointer]:
                          - text: Show full caption
                          - generic [ref=e539]: 
                        - button "Figure viewer" [ref=e540]
                  - paragraph [ref=e541]:
                    - text: However, the envelope of the TI stimulus can be extracted if the stimulus is rectified and then low-pass filtered (“demodulator” power spectrum in
                    - link "Figure 3" [ref=e542] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: C). Rectifying a signal before low-pass filtering is an established method of demodulating multiplied and convolved signals (
                    - link "Oppenheim et al., 1968" [ref=e544] [cursor=pointer]:
                      - /url: "#"
                    - text: ). In fact, prior experimental results have suggested that the cellular response to the envelope of high-frequency signals occurs through nonlinear processes, such as half-wave rectification (
                    - link "Middleton et al., 2006" [ref=e546] [cursor=pointer]:
                      - /url: "#"
                    - text: ).
                  - paragraph [ref=e547]:
                    - text: To examine if neural membranes perform rectification in response to TI stimulation, we applied a subthreshold TI stimulus to the axon. We observed high-frequency oscillations of the membrane voltage, but the moving average of the membrane voltage showed low-frequency oscillations (“full axon model” in
                    - link "Figure 3" [ref=e548] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: E). Moreover, the power spectrum of the membrane voltage contained frequency elements that were exactly equal to the beat frequency (“full axon model” power spectrum in
                    - link "Figure 3" [ref=e549] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: E). Therefore, the axon had properties that enable the demodulation of an amplitude-modulated stimulus. However, the axon did not perform as a perfect demodulator because high-frequency oscillations were obvious in the membrane voltage and the frequency content still contained high-frequency elements.
                  - paragraph [ref=e550]:
                    - text: We hypothesized that rectification arises from nonlinearities in the ion channel dynamics and that this rectification is necessary for demodulation of the TI stimulus. To test our hypothesis, we applied the same subthreshold TI stimulus to a passive axon in which we had removed all active ion channels. Again, the membrane voltage showed high-frequency oscillations, but we observed no rectification as the moving average was equal to the resting voltage (“passive axon model” in
                    - link "Figure 3" [ref=e551] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: D). Furthermore, the low-frequency content associated with the beat frequency was also absent in the power spectrum for the passive axon (“passive axon model” power spectrum in
                    - link "Figure 3" [ref=e552] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: D). Therefore, low-pass filtering properties of neurons are not sufficient to extract the envelope of the TI stimulation and rectification is necessary.
                  - paragraph [ref=e553]:
                    - text: We hypothesized that this quasi-rectification must be generated by a preference of the active neuron membrane to inject or eject currents through ion channels. Therefore, we investigated each of the ion currents passing through the membrane during a subthreshold TI stimulus (
                    - link "Figure 3" [ref=e554] [cursor=pointer]:
                      - /url: "#fig3"
                    - text: F). At a node of Ranvier close to the stimulating electrodes, the fast Na
                    - superscript [ref=e555]: +
                    - text: current clearly dominated the other currents and generated a total inward current, which depolarized the axon. Hence, rectification occured at the membrane because the increase in Na
                    - superscript [ref=e556]: +
                    - text: channel conductance was larger than the increase in K
                    - superscript [ref=e557]: +
                    - text: channel conductance. This rectification also occurred because of the specific gating properties of fast Na
                    - superscript [ref=e558]: +
                    - text: channels, in which they activate more rapidly than they inactivate in response to depolarization. We also observed that the rectification properties were closely related to the resonance behavior of the axon (
                    - link "Figure S1" [ref=e559] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ) and could predict the optimum TI frequency (the beat frequency that resulted in the lowest activation threshold). In consequence of these rectification properties, additional analysis showed that TI produces membrane excitation only when the envelope of the stimulation is near its maximum (
                    - link "Figure S2" [ref=e560] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ).
                - generic [ref=e561]:
                  - heading "TI Excitation Is Governed by Amplitude Modulation of the Electric Field for Axon Terminals and the Activating Function for Long Axons" [level=3] [ref=e562]
                  - paragraph [ref=e563]:
                    - text: We then investigated the action potential initiation sites in response to TI stimulation, and more specifically, which field variables determine the location of these initiation sites (
                    - link "Figure 4" [ref=e564] [cursor=pointer]:
                      - /url: "#fig4"
                    - text: A). This question is of high practical value since hypothetical medical devices using TI must be tuned to direct neural activation toward certain spatial targets within the brain or other regions of the nervous system. Understanding which field variables drive excitation would allow such therapeutic tuning.
                  - figure "Figure 4 TI Excitation Is Governed by AM of the Electric Field or the Activating Function Show full caption  Figure viewer" [ref=e566]:
                    - link [ref=e567] [cursor=pointer]:
                      - /url: /cms/10.1016/j.cels.2020.10.004/asset/092b85f9-a54d-4dc6-a135-d58f16d555b2/main.assets/gr4_lrg.jpg
                      - text: 
                      - img [ref=e568]
                    - generic [ref=e569]:
                      - generic [ref=e570]: Figure 4 TI Excitation Is Governed by AM of the Electric Field or the Activating Function
                      - generic [ref=e572]:
                        - button "Show full caption " [ref=e573] [cursor=pointer]:
                          - text: Show full caption
                          - generic [ref=e574]: 
                        - button "Figure viewer" [ref=e575]
                  - paragraph [ref=e576]:
                    - text: Previous studies on TI suggested that the variable that predicts the area of activation was related to the electric field, and specifically, the region where temporal modulation of the electric field was maximal (
                    - link "Grossman et al., 2017" [ref=e578] [cursor=pointer]:
                      - /url: "#"
                    - text: ). However, decades of research have shown that the electric field is not the only factor driving excitation in response to extracellular stimulation (
                    - link "Ladenbauer et al., 2010" [ref=e580] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "McNeal, 1976" [ref=e582] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Rattay, 1986" [ref=e584] [cursor=pointer]:
                      - /url: "#"
                    - text: ","
                    - link "Reference 1990" [ref=e586] [cursor=pointer]:
                      - /url: "#"
                      - text: "1990"
                    - text: ). Indeed, the electrophysiological properties of neurons and axons can be represented as networks of resistors and capacitors using a method developed in the 19
                    - superscript [ref=e587]: th
                    - text: century by Lord Kelvin, known as cable theory (
                    - link "Thomson, 1856" [ref=e589] [cursor=pointer]:
                      - /url: "#"
                    - text: ). In cable theory, the corresponding second-order partial differential equation describes the electrical behavior of an axon. By examining this equation, it is clear that the initial response along an axon membrane to an external electrical stimulus is driven by the second-order spatial derivative of the extracellular voltages along the axon. This term is well known as the "activating function" (
                    - link "Rattay, 1986" [ref=e591] [cursor=pointer]:
                      - /url: "#"
                    - text: ). Instead, at axon terminals embedded in external electrical fields, the initial response is determined by the electric field.
                  - paragraph [ref=e592]:
                    - text: Following this reasoning, we believed that the neural response to TI stimulation would obey similar principles as traditional stimulation paradigms. Hence, we hypothesized that TI excitation would be related to the electric field for stimulation near an axon terminal while it would be related to the activating function for stimulation along the remaining axon. Therefore, we investigated the location of action potential initiation along the axon in response to TI stimulation (
                    - link "Figure 4" [ref=e593] [cursor=pointer]:
                      - /url: "#fig4"
                    - text: "). We performed analyses for stimulation both near the end and middle of the axon. We compared different field variables to the location of action potential initiation and looked if the maxima of these variables matched the action potential initiation sites. We considered the following quantities: AM of the electric potential, electric field (as previously proposed ["
                    - link "Grossman et al., 2017" [ref=e595] [cursor=pointer]:
                      - /url: "#"
                    - text: "]), and the activating function (second-order derivative of the electric potential). For this analysis, we used carrier frequencies of 1, 2, and 4 kHz, and tested beat frequencies of 1–50 Hz in steps of 1 Hz (see"
                    - link "STAR Methods" [ref=e596] [cursor=pointer]:
                      - /url: "#sec-4"
                    - text: and Supplemental Information). We determined the activation sites for all of the beat and carrier frequencies. We pooled data to provide a distribution of activation sites and a description of initiation sites for TI stimulation in general instead of initiation sites for specific carrier and beat frequencies.
                  - paragraph [ref=e597]:
                    - text: For stimulation applied near the axon terminals, we compared the spatial behavior of each field variable to the position of the action potential initiation sites.
                    - link "Figures 4" [ref=e598] [cursor=pointer]:
                      - /url: "#fig4"
                    - text: B–4D summarize these calculations and clearly show that action potentials are most likely to be generated where AM of the electric field is maximal. We also observed that the carrier and beat frequency contents were both maximum at the nodes of Ranvier where AM of the electric field is maximum (see
                    - link "Figure S1" [ref=e599] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: D). This finding supports previous speculations that AM of the electric field is the driving force for TI stimulation (
                    - link "Grossman et al., 2017" [ref=e601] [cursor=pointer]:
                      - /url: "#"
                    - text: ).
                  - paragraph [ref=e602]:
                    - text: In contrast, for stimulation along longitudinal axons, we observed some interesting differences. First, we observed that axons did not possess only one but two dominant action potential initiation sites (histograms in
                    - link "Figures 4" [ref=e603] [cursor=pointer]:
                      - /url: "#fig4"
                    - text: E–4G). Second, when comparing the spatial behavior of each field variable to the position of these initiation sites,
                    - link "Figure 4" [ref=e604] [cursor=pointer]:
                      - /url: "#fig4"
                    - text: F clearly shows that action potentials were most likely to be generated where AM of the activating function is maximal. Furthermore, we observed that the carrier frequency content and the beat frequency content were both maximum at the nodes of Ranvier where AM of the activating function is maximum (see
                    - link "Figure S1" [ref=e605] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: G). These findings contradict previous speculations that AM of the electric field is the sole driving force for TI stimulation (
                    - link "Grossman et al., 2017" [ref=e607] [cursor=pointer]:
                      - /url: "#"
                    - text: ). In fact, no action potentials are initiated where AM of the electric field is maximum (
                    - link "Figure 4" [ref=e608] [cursor=pointer]:
                      - /url: "#fig4"
                    - text: F). These results support the concept that AM of the activating function along axons is the driving force for neural activity generated by TI stimulation. This result is analogous to the activating function concept shown in traditional neurostimulation applications (
                    - link "McNeal, 1976" [ref=e610] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Rattay, 1986" [ref=e612] [cursor=pointer]:
                      - /url: "#"
                    - text: ).
                - generic [ref=e613]:
                  - heading "Multiple Classes of Neural Responses Are Observed during TI Stimulation" [level=3] [ref=e614]
                  - paragraph [ref=e615]:
                    - text: Previous studies have suggested that the neural response to TI stimulation is binary, i.e., neurons are either activated in phase with the stimulus envelope or they remain silent. This scenario was based on experimental data suggesting that neurons located near the maximum AM were activated, while neurons in the same region did not respond to the high-frequency stimulation generated by an individual pair of electrodes (
                    - link "Grossman et al., 2017" [ref=e617] [cursor=pointer]:
                      - /url: "#"
                    - text: ). However, several works have shown that neurons do respond to high-frequency signals similar to those applied by individual electrode pairs in TI stimulation. However, the neural response to the kilohertz-frequency stimulation is quite complex and exhibits several classes of operating domains or effect states (
                    - link "Bhadra et al., 2019" [ref=e619] [cursor=pointer]:
                      - /url: "#"
                    - text: ). For example, neurons can have only an initial response to the stimulation or they can fire continuously throughout the duration of the stimulus (
                    - link "Crosby et al., 2017" [ref=e621] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Lempka et al., 2015" [ref=e623] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Zander et al., 2020" [ref=e625] [cursor=pointer]:
                      - /url: "#"
                    - text: ). Another phenomenon observed during the kilohertz-frequency stimulation is known as the “conduction block” (
                    - link "Bhadra et al., 2019" [ref=e627] [cursor=pointer]:
                      - /url: "#"
                    - text: ). During conduction block, the kilohertz-frequency stimulus blocks or inhibits action potential propagation along an axon. High-frequency conduction block has been extensively studied because of its potential indications for neuroprosthetic technologies. Given the complexity of neural responses observed in previous studies of kilohertz-frequency stimulation, we hypothesized that axons may also exhibit multiple operating domains during TI stimulation.
                  - paragraph [ref=e628]:
                    - text: We then extended our previous results to all regions of space and examined these domains throughout our system (
                    - link "Figure 5" [ref=e629] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: ). We tuned stimulation amplitude using the activation threshold for the optimum beat frequency of 5 Hz (see
                    - link "Figure S1" [ref=e630] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ) and a carrier frequency of 2 kHz (
                    - link "Figure 5" [ref=e631] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: B). To compare the effects of TI and No-TI (
                    - generic "f 1 equals f 2" [ref=e632]:
                      - generic [ref=e634]:
                        - generic [ref=e635]:
                          - generic [ref=e637]: 𝑓
                          - generic [ref=e640]: "1"
                        - generic [ref=e642]: =
                        - generic [ref=e643]:
                          - generic [ref=e645]: 𝑓
                          - generic [ref=e648]: "2"
                    - text: ) stimulation, we also used the same minimum activation threshold and stimulated axons with a control stimulation protocol where the beat frequency was zero between the current pairs (
                    - link "Figure 5" [ref=e649] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: C).
                  - figure "Figure 5 Multiple Classes of Neural Responses Are Observed during TI Stimulation Show full caption  Figure viewer" [ref=e651]:
                    - link [ref=e652] [cursor=pointer]:
                      - /url: /cms/10.1016/j.cels.2020.10.004/asset/2cbe455d-1605-4385-be29-03a86d374d80/main.assets/gr5_lrg.jpg
                      - text: 
                      - img [ref=e653]
                    - generic [ref=e654]:
                      - generic [ref=e655]: Figure 5 Multiple Classes of Neural Responses Are Observed during TI Stimulation
                      - generic [ref=e657]:
                        - button "Show full caption " [ref=e658] [cursor=pointer]:
                          - text: Show full caption
                          - generic [ref=e659]: 
                        - button "Figure viewer" [ref=e660]
                  - paragraph [ref=e661]:
                    - text: As expected from our previous results, we observed phasic neural activity for axons at the midline (y = 0 mm) during TI stimulation. However, the No-TI stimulation showed only initial onset activity (
                    - link "Figure 5" [ref=e662] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: C). Therefore, TI stimulation seems to elicit activity in the deeper tissue when the No-TI stimulation fails to do so. Axons located farther away from the midline and closer to one individual pair of electrodes experienced smaller AM but overall higher-amplitude stimuli (e.g., y = 1.7 and 3.5 mm in
                    - link "Figure 5" [ref=e663] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: A) and these axons were not expected to respond to the low-frequency modulating envelope. Indeed, at y = 1.7 mm from the midline, we observed tonic neural activity for both TI and No-TI stimulation (
                    - link "Figures 5" [ref=e664] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: B and 5C). This result indicates that tonic neural firing may occur at the border of the region of maximal AM. Finally, moving even closer to the electrode pairs (e.g. y = 3.5 mm), we observed a region where only onset activity occurred for both TI and No-TI stimulation (
                    - link "Figures 5" [ref=e665] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: B and 5C). Axons were otherwise silent for the duration of the stimuli. The presence of such a region supports the idea that regions of low AM cannot be activated with high-frequency stimuli alone.
                  - paragraph [ref=e666]:
                    - text: However, we wanted to verify that axons that appeared silent were not actually in a state of conduction block. Conduction block is typically observed as an initial period of onset activity followed by a quiescent period in which no action potentials can propagate past the stimulus focus (
                    - link "Bhadra et al., 2019" [ref=e668] [cursor=pointer]:
                      - /url: "#"
                    - text: ). To test for conduction block, we followed the common methodology of injecting a test pulse at one end of the axon (node 0) and examining if the resultant action potential successfully propagated to the other end of the axon (node 100) (
                    - link "Figure 5" [ref=e669] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: D) (
                    - link "Bhadra et al., 2007" [ref=e671] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Lempka et al., 2015" [ref=e673] [cursor=pointer]:
                      - /url: "#"
                    - text: ). If the resultant action potential failed to propagate to the other end of the axon, then the axon was in a state of conduction block that inhibited action potential propagation.
                    - link "Figure 5" [ref=e674] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: D shows the results of the conduction block test. For the No-TI stimulation and the axon at y=0 mm, we clearly observed that the test pulse traveled through the axon, which indicated a quiescence axon. However, at y = 3.5 mm, the test pulse did not travel through the axon, which indicated that conduction block had occurred. We observed conduction block for both TI and No-TI stimuli. Thus, the absence of activity in the regions of low or no AM can be due to conduction block. The results described above and shown in
                    - link "Figure 5" [ref=e675] [cursor=pointer]:
                      - /url: "#fig5"
                    - text: are for stimulation applied near the middle of the axon (node 50 at x = 0 mm). We performed the same analysis for stimulation applied near the end of the axon (node 100 at x = 0 mm) and we observed similar trends for both TI and No-TI stimulation (
                    - link "Figures S3–S5" [ref=e676] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ).
                - generic [ref=e677]:
                  - heading "The “Sandwich” Hypothesis" [level=3] [ref=e678]
                  - paragraph [ref=e679]:
                    - text: Accurately characterizing the spatial distribution of these response types is critical to understand if TI can effectively stimulate deep neural structures, especially if this excitation comes at the cost of blocking neural activity in more superficial tissues. Therefore, to further characterize the response types generated during TI stimulation, we examined the firing patterns of all axons located between the electrodes in increments of 0.1 mm (
                    - link "Figure 6" [ref=e680] [cursor=pointer]:
                      - /url: "#fig6"
                    - text: "). We performed this analysis for both TI and No-TI controls applied near the middle of the axon. We summarized the raster plots as firing rates. The bar plots represent the steady-state firing behavior of the axons as a function of distance from the midline. Based on the summary of the raster plots, we classified axon firing rates into the following response classes: quiescent, blocked, phasic, or tonic. For TI stimulation, we observed a phasic regime near the center while these axons were quiescent for the No-TI stimulation ("
                    - link "Figures 6" [ref=e681] [cursor=pointer]:
                      - /url: "#fig6"
                    - text: A and 6B). Therefore, TI stimulation activated axons in a deep region, whereas the No-TI stimulation failed to activate the same axons.
                  - figure "Figure 6 The “Sandwich” Hypothesis Show full caption  Figure viewer" [ref=e683]:
                    - link [ref=e684] [cursor=pointer]:
                      - /url: /cms/10.1016/j.cels.2020.10.004/asset/18f7c09b-bb6a-4564-a3e1-db010891ac0d/main.assets/gr6_lrg.jpg
                      - text: 
                      - img [ref=e685]
                    - generic [ref=e686]:
                      - generic [ref=e687]: Figure 6 The “Sandwich” Hypothesis
                      - generic [ref=e689]:
                        - button "Show full caption " [ref=e690] [cursor=pointer]:
                          - text: Show full caption
                          - generic [ref=e691]: 
                        - button "Figure viewer" [ref=e692]
                  - paragraph [ref=e693]: However, as we moved away from the midline, we also observed regions of phasic activity followed by regions of tonic activity for both TI and No-TI stimulations. The presence of these two regions shows that a strong stimulus with little-to-no AM can also activate axons at the margin of the TI-effective spatial region. Next, we observed a region of conduction block for both TI and No-TI stimulations. Moving closer to the electrodes resulted in another small region of tonic activity for the TI and No-TI stimulations. Finally, we observed the outmost superficial layers to be blocked for both TI and No-TI stimulations. We termed this spatial pattern a “sandwich,” as layers of tonic firing and conduction block alternated and covered the deep TI-responsive region.
                  - paragraph [ref=e694]:
                    - text: As our results contradicted the initial hypothesis motivating the development of TI as a non-invasive neuromodulation strategy, we wanted to verify that our mathematical modeling was robust to parameter variation and not a result of specific parameters. Therefore, we performed a parameter sensitivity analysis by varying the time constants of the ion channels in our axon model (see
                    - link "STAR Methods" [ref=e695] [cursor=pointer]:
                      - /url: "#sec-4"
                    - text: ). We changed the forward and backward rates of the channel states equally so that the time constants were altered by ±25% while the steady-state activation profiles remained unchanged. Note that we needed to adjust the activation thresholds when we changed the model parameters (see
                    - link "STAR Methods" [ref=e696] [cursor=pointer]:
                      - /url: "#sec-4"
                    - text: ).
                    - link "Figures 6" [ref=e697] [cursor=pointer]:
                      - /url: "#fig6"
                    - text: C and 6D show that our results are consistent across 50% variation in the parameter range (and even across a larger parameter range, see
                    - link "Figure S4" [ref=e698] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ). We performed the same analysis for all of the carrier frequencies (1, 2, and 4 kHz) and beat frequencies (2, 5, and 20 Hz) that we considered in this study (
                    - link "Figure S3" [ref=e699] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ) and for stimulation applied near the end of the axon (
                    - link "Figures S3" [ref=e700] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: A and
                    - link "S4" [ref=e701] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: A). Even though the size of the specific regions changed, the relative sandwich pattern remained largely unchanged and showed that these results are robust. Notably, we did not observe conduction block when utilizing a carrier frequency of 1 kHz (
                    - link "Figure S3" [ref=e702] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ) or after a 50% decrease in the time constant of the fast sodium channel activation variable (
                    - generic "tau Subscript m" [ref=e703]:
                      - generic [ref=e706]:
                        - generic [ref=e708]: 𝜏
                        - generic [ref=e711]: 𝑚
                    - text: ) (
                    - link "Figure S4" [ref=e712] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ). Under these conditions, the carrier frequencies were below the minimum block frequency; however, we still observed multiple response classes (quiescent, phasic, and tonic) (see Supplemental Information). These results suggest that the neural response to TI is not binary. Stimulation parameters necessary to produce TI activation at deep regions also likely produce multiple response types, including tonic firing and conduction block, in more superficial neural tissue at both axon terminals and along axons.
                  - paragraph [ref=e713]:
                    - text: As large-diameter axons have the lowest threshold to extracellular stimulation (
                    - link "McNeal, 1976" [ref=e715] [cursor=pointer]:
                      - /url: "#"
                    - text: ), we performed our simulations with model axons with a fiber diameter of 8.7 μm that can be found within peripheral nerves, the spinal cord, and the corticospinal tract (
                    - link "Feirabend et al., 2002" [ref=e717] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Terao et al., 1994" [ref=e719] [cursor=pointer]:
                      - /url: "#"
                    - text: ;
                    - link "Ugrenović et al., 2016" [ref=e721] [cursor=pointer]:
                      - /url: "#"
                    - text: ). However, the brain has an abundance of small-diameter axons (
                    - link "Benavides-Piccione et al., 2020" [ref=e723] [cursor=pointer]:
                      - /url: "#"
                    - text: ). Therefore, we also tested our “sandwich” hypothesis for a range of fiber diameters by performing the same analysis shown in
                    - link "Figure 6" [ref=e724] [cursor=pointer]:
                      - /url: "#fig6"
                    - text: . We found that the general “sandwich” response did not change for small or large fibers (
                    - link "Figure S5" [ref=e725] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ), except for 2.0-μm diameter fibers for which we did not observe conduction block. Small 2.0-μm diameter fibers exhibited phasic activation near the midline and tonic firing in more superficial fibers (
                    - link "Figure S5" [ref=e726] [cursor=pointer]:
                      - /url: "#mmc1"
                    - text: ). For 2.0-μm diameter fibers, conduction block could be possible at higher frequencies (e.g. 5–20 kHz) than the carrier frequencies considered in our study (
                    - link "Pelot et al., 2017" [ref=e728] [cursor=pointer]:
                      - /url: "#"
                    - text: ). The lack of conduction block may also indicate a limitation of our axon model at small diameters because it has not been validated in this range (
                    - link "Pelot et al., 2017" [ref=e730] [cursor=pointer]:
                      - /url: "#"
                    - text: ). However, even for small fiber diameters, it was not possible to generate a TI response in deep axons without producing undesired effects, such as tonic firing or conduction block, in more superficial axons. It is also important to note that the activation thresholds for small-diameter fibers were much higher than the activation thresholds for large axons. For example, the activation threshold (carrier frequency of 2 kHz, beat frequency of 5 Hz, and stimulation near the middle of the fiber) for a fiber at the midline with a diameter of 8.7 μm was 5.4 mA, while the activation threshold for a fiber with a diameter of 2.0 μm was 108.5 mA. Therefore, targeting small-diameter fibers within the brain or elsewhere in the nervous system will most likely activate and/or induce conduction block in large-diameter fibers before modulating activity in the target small-diameter fibers.
              - generic [ref=e731]:
                - heading "Discussion" [level=2] [ref=e732]
                - paragraph [ref=e733]:
                  - text: In this study, we presented simple physical calculations to systematically characterize the neural responses to TI stimulation. Our results provide theoretical support for the neural responses to TI observed in single-cell in vitro experiments (
                  - link "Grossman et al., 2017" [ref=e735] [cursor=pointer]:
                    - /url: "#"
                  - text: ). However, our results demonstrate that the previously proposed mechanism of passive membrane filtering is insufficient for TI excitation because the TI stimulus does not contain any low-frequency information. Instead, an active ion-channel mediated signal rectification process is required for TI excitation. Unfortunately, this mechanism is also linked to the phenomenon of high-frequency conduction block, which has significant implications for the application of TI for clinical neurostimulation therapies.
                - paragraph [ref=e736]:
                  - text: Indeed, in our study, it was not possible to produce TI responses without also inducing activation and/or conduction block in non-targeted areas that could generate unwanted side effects. We summarized these response patterns with the “sandwich” hypothesis, which contradicts the previous interpretation of experimental results on TI. At the current amplitudes required to generate sufficiently strong AM in the deep tissue, more superficial layers will be subjected to higher-amplitude non-modulated fields that will force neurons in these regions to respond with tonic firing or conduction block. This is a simple and obvious consequence of the inverse distance relationship of electromagnetic radiation within a conductive medium that is independent of geometry. In fact, this consequence will likely be exacerbated by the distance between electrodes and target tissues at the scale of the human head (
                  - link "Howell and McIntyre, 2020" [ref=e738] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Therefore, we believe that the “sandwich” hypothesis must be considered in the tentative design of TI neuromodulation technologies.
                - paragraph [ref=e739]:
                  - text: For example, one attractive application of TI technologies would be non-invasive deep brain stimulation to treat a variety of neurological and psychiatric conditions, such as Parkinson’s disease (
                  - link "Grossman et al., 2018" [ref=e741] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Lozano et al., 2019" [ref=e743] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Current deep brain stimulation approaches to treat Parkinson’s disease involve implantation of electrodes in deep brain areas, such as the subthalamic nucleus. One putative mechanism of deep brain stimulation of the subthalamic nucleus is the activation of the subthalamo-pallidal pathway (“Target” axons in
                  - link "Figure 7" [ref=e744] [cursor=pointer]:
                    - /url: "#fig7"
                  - text: ) to alleviate the motor symptoms of Parkinson’s disease (
                  - link "Johnson et al., 2008" [ref=e746] [cursor=pointer]:
                    - /url: "#"
                  - text: ). However, the therapeutic range of deep brain stimulation is limited by unwanted side effects (e.g., contralateral muscle contractions) that are generated when stimulation spreads outside of the target and activates other pathways that pass nearby the subthalamic nucleus (e.g., the corticospinal tract—“Side effects” axons in
                  - link "Figure 7" [ref=e747] [cursor=pointer]:
                    - /url: "#fig7"
                  - text: ). Therefore, deep brain stimulation technologies must have sufficient selectivity to activate the target areas to produce the desired symptom relief while avoiding modulation of non-target areas that produce undesired side effects. This required selectivity may represent a major challenge for TI technologies because our results suggest that the parameters necessary to generate phasic activation in the target pathways (e.g., the subthalamo-pallidal pathway) would likely produce phasic activation, tonic activation, and/or conduction block in superficial pathways (e.g., the corticospinal pathway) that would cause undesired side effects (
                  - link "Figure 7" [ref=e748] [cursor=pointer]:
                    - /url: "#fig7"
                  - text: ).
                - figure "Figure 7 Clinical Implications of TI Stimulation Show full caption  Figure viewer" [ref=e750]:
                  - link " Figure 7 Clinical Implications of TI Stimulation TI stimulation can produce multiple types of neural responses. TI stimulation may provide therapeutic benefit by inducing the desired phasic responses in the target neural populations (e.g., subthalamo-pallidal pathway—“Target” axons—to relieve motor symptoms associated with Parkinson’s disease). However, this phasic excitation may come at the cost of producing additional responses (e.g., tonic firing and conduction block) in untargeted areas (e.g., corticospinal tract—“Side effects” axons) that may produce undesired side effects. This issue is critical to the development of efficacious clinical therapies that utilize TI stimulation." [ref=e751] [cursor=pointer]:
                    - /url: /cms/10.1016/j.cels.2020.10.004/asset/9260181d-41fc-47c2-828d-aaa6368e41cd/main.assets/gr7_lrg.jpg
                    - text: 
                    - img "Figure 7 Clinical Implications of TI Stimulation TI stimulation can produce multiple types of neural responses. TI stimulation may provide therapeutic benefit by inducing the desired phasic responses in the target neural populations (e.g., subthalamo-pallidal pathway—“Target” axons—to relieve motor symptoms associated with Parkinson’s disease). However, this phasic excitation may come at the cost of producing additional responses (e.g., tonic firing and conduction block) in untargeted areas (e.g., corticospinal tract—“Side effects” axons) that may produce undesired side effects. This issue is critical to the development of efficacious clinical therapies that utilize TI stimulation." [ref=e752]
                  - generic [ref=e753]:
                    - generic [ref=e754]: Figure 7 Clinical Implications of TI Stimulation
                    - generic [ref=e756]:
                      - button "Show full caption " [ref=e757] [cursor=pointer]:
                        - text: Show full caption
                        - generic [ref=e758]: 
                      - button "Figure viewer" [ref=e759]
                - paragraph [ref=e760]:
                  - text: Our theoretical analysis is based on established and simple physical calculations. This approach allowed us to make conclusions that can be experimentally tested. Specifically, our study demands for controls assessing potential conduction block and other response patterns generated in experimental studies of TI. In light of our results, experimental studies that only control for TI-like responses during TI versus No-TI in the target region do not constitute a correct experimental design. We found that neurons in the deep regions fire in phase with the envelope of the TI stimulus while being silent during standard high-frequency stimulation. Therefore, investigation of the behavior of non-targeted layers becomes critical to proving the efficacy of TI stimulation. Grossman et al., performed experiments in the mouse brain examining changes in c-fos expression as a marker of neural activity (
                  - link "Grossman et al., 2017" [ref=e762] [cursor=pointer]:
                    - /url: "#"
                  - text: ). These experiments showed that while TI stimulation elicited an increase in c-fos expression in the hippocampus, it did not produce significant changes in c-fos expression in superficial cortical (non-targeted) regions. This result suggests that for the specific regions investigated, TI stimulation elicited a response in the deep tissue and not in the superficial layers. However, it is important to recognize that because c-fos protein is mostly induced in nuclei of neurons (
                  - link "Dragunow and Robertson, 1987" [ref=e764] [cursor=pointer]:
                    - /url: "#"
                  - text: ), c-fos expression can only be an indicator of somatic activity (
                  - link "Gao and Ji, 2009" [ref=e766] [cursor=pointer]:
                    - /url: "#"
                  - text: "). Therefore, the general validity of this method is limited because: (1) at high firing rates, antidromic action potentials may fail to successfully propagate into the somata of certain classes of neurons due to large discrepancies in conduction properties between the axon and the large somas ("
                  - link "Anderson et al., 2018" [ref=e768] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Yi and Grill, 2018" [ref=e770] [cursor=pointer]:
                    - /url: "#"
                  - text: ) and impedance mismatch (
                  - link "Fuortes et al., 1957" [ref=e772] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Goldstein and Rall, 1974" [ref=e774] [cursor=pointer]:
                    - /url: "#"
                  - text: ); (2) axons may be recruited in some areas and blocked in others, thus preventing antidromic activity from reaching the somata; and (3) non-expression of c-fos is not an indicator of conduction block. These combined insights highlight the limitation of experimental controls that do not directly test for conduction block but rather for positive neural activation. Perhaps, experiments on simpler geometries, such as peripheral nerves, may help in the design of these controls.
                - paragraph [ref=e775]:
                  - text: Grossman et al., proposed TI as a potential non-invasive alternative to DBS (i.e., suprathreshold stimulation) (
                  - link "Grossman et al., 2017" [ref=e777] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Therefore, in this study, we investigated conditions necessary for the direct recruitment of axons, which are most susceptible to polarization (
                  - link "Aberra et al., 2018" [ref=e779] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Chakraborty et al., 2018" [ref=e781] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Howell and McIntyre, 2020" [ref=e783] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "McIntyre et al., 2004" [ref=e785] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rahman et al., 2013" [ref=e787] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Wongsarnpigoon and Grill, 2012" [ref=e789] [cursor=pointer]:
                    - /url: "#"
                  - text: ). However, there is significant theoretical and experimental evidence that non-invasive transcranial electrical stimulation approaches do not generate the electric fields necessary to produce direct excitation (
                  - link "Datta et al., 2009" [ref=e791] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rampersad et al., 2019" [ref=e793] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Vöröslakos et al., 2018" [ref=e795] [cursor=pointer]:
                    - /url: "#"
                  - text: ). A recent computational modeling study investigated a large number of parameter sets to optimize the penetration depths of TI stimulation, including the pallidum, which is directly relevant to the example presented in
                  - link "Figure 7" [ref=e796] [cursor=pointer]:
                    - /url: "#fig7"
                  - text: (
                  - link "Rampersad et al., 2019" [ref=e798] [cursor=pointer]:
                    - /url: "#"
                  - text: ). For a stimulation current of 2 mA (a common value used in human experiments) (
                  - link "Lefaucheur et al., 2017" [ref=e800] [cursor=pointer]:
                    - /url: "#"
                  - text: ), the maximum electric field anywhere in the brain and in any direction was <0.8 V/m. This electric field was well below the range necessary to activate deep brain or cortical structures with conventional stimulation (∼28–120 V/m) (
                  - link "Åström et al., 2015" [ref=e802] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Radman et al., 2009" [ref=e804] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rampersad et al., 2019" [ref=e806] [cursor=pointer]:
                    - /url: "#"
                  - text: ) and the range necessary for TI stimulation in our study (10–30 and 38–107 V/m near the end and middle of the axon, respectively). Therefore, TI would require much higher current values than normally used in non-invasive stimulation and likely induce the block effects we observed in our theoretical analysis.
                - paragraph [ref=e807]:
                  - text: However, multiple studies have also highlighted the possibility of transcutaneous stimulation, including TI, to provide subthreshold neuromodulation rather than direct activation of neurons. In this case, electric fields and currents are used to bias synaptic transmission by polarizing axon terminals (
                  - link "Chakraborty et al., 2018" [ref=e809] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rahman et al., 2013" [ref=e811] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Polarization effects that alter neural firing, synaptic transmission, and subthreshold currents can be obtained with lower field strengths compared with direct recruitment (∼1 V/m) (
                  - link "Berényi et al., 2012" [ref=e813] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Datta et al., 2009" [ref=e815] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Fröhlich and McCormick, 2010" [ref=e817] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Ozen et al., 2010" [ref=e819] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Vöröslakos et al., 2018" [ref=e821] [cursor=pointer]:
                    - /url: "#"
                  - text: ). It may be possible to obtain these subthreshold fields strengths with TI stimulation and to direct TI fields toward specific deep brain regions by utilizing specific electrode montages, electrode sizes, and multiple waveforms (
                  - link "Cao and Grover, 2020" [ref=e823] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Howell and McIntyre, 2020" [ref=e825] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Huang and Parra, 2019" [ref=e827] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Rampersad et al., 2019" [ref=e829] [cursor=pointer]:
                    - /url: "#"
                  - text: ). It may also be possible to exploit cellular or network features that are specific to certain brain regions (
                  - link "Esmaeilpour et al., 2019" [ref=e831] [cursor=pointer]:
                    - /url: "#"
                  - text: ) to maximize the subthreshold effects of TI stimulation. Moreover, the potential effects of transcutaneous stimulation, including TI, may not be limited to neurons. For example, it has been suggested that glial cells may be affected by transcranial electric stimulation (
                  - link "Gellner et al., 2016" [ref=e833] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Mishima et al., 2019" [ref=e835] [cursor=pointer]:
                    - /url: "#"
                  - text: ;
                  - link "Ruohonen and Karhu, 2012" [ref=e837] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Some of these phenomena have been preliminarily explored by Grossman et al., in their safety assessment of TI with no evidence of anatomical side effects (
                  - link "Grossman et al., 2017" [ref=e839] [cursor=pointer]:
                    - /url: "#"
                  - text: ). Nevertheless, future TI studies should consider these effects and perhaps other possible neuromodulatory effects of non-invasive stimulation, such as modulation of synaptic plasticity (
                  - link "Ranieri et al., 2012" [ref=e841] [cursor=pointer]:
                    - /url: "#"
                  - text: ) or cerebral blood flow (
                  - link "Wachter et al., 2011" [ref=e843] [cursor=pointer]:
                    - /url: "#"
                  - text: ). In our study, we focused on direct neural activation with TI stimulation and did not explore these subthreshold properties or effects on glial cells. Therefore, future work should be directed toward these areas to complement our results and reach a general understanding of TI as a potential neuromodulation technology.
                - paragraph [ref=e844]: In summary, we believe that the results of this study will help ensure that future work can begin on a solid theoretical understanding of the neural response to TI stimulation. If TI is to evolve into a mature and clinically effective technology, these theoretical concepts must be considered in the design of clinical technologies.
