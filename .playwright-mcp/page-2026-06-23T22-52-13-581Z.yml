                - heading "Highlights" [level=2] [ref=e170]
                - paragraph [ref=e171]:
                  - list [ref=e172]:
                    - listitem [ref=e173]:
                      - generic [ref=e174]: •
                      - paragraph [ref=e176]: We investigated the physics of neurostimulation with TI
                    - listitem [ref=e177]:
                      - generic [ref=e178]: •
                      - paragraph [ref=e180]: Ion-channel-mediated rectification of currents allows neurons to respond to TI
                    - listitem [ref=e181]:
                      - generic [ref=e182]: •
                      - paragraph [ref=e184]: Current rectification induces tonic firing and conduction block in off-target axons
                    - listitem [ref=e185]:
