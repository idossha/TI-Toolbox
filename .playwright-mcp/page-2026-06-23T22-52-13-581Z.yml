                  - generic [ref=e3334]:
                    - heading "Myelinated Axon Model" [level=4] [ref=e3335]
                    - paragraph [ref=e3336]:
                      - text: Axons and axon terminals have been shown to have the lowest threshold to invasive and non-invasive extracellular electrical stimulation (
                      - link "Aberra et al., 2018" [ref=e3338] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Chakraborty et al., 2018" [ref=e3340] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Howell and McIntyre, 2020" [ref=e3342] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "McIntyre et al., 2004" [ref=e3344] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Rahman et al., 2013" [ref=e3346] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Wongsarnpigoon and Grill, 2012" [ref=e3348] [cursor=pointer]:
                        - /url: "#"
                      - text: ). And because TI stimulation has been proposed as a potential non-invasive alternative to deep brain stimulation (i.e. suprathreshold stimulation) (
                      - link "Grossman et al., 2017" [ref=e3350] [cursor=pointer]:
                        - /url: "#"
                      - text: ), we modified a previously published compartmental model of a myelinated mammalian axon (
                      - link "McIntyre et al., 2002" [ref=e3352] [cursor=pointer]:
                        - /url: "#"
                      - text: ) to assess the axonal response to TI stimulation. This myelinated axon model includes active nodes of Ranvier and passive internode regions. In the original model, both the backward and forward rates for the slow potassium channel increase with the membrane potential. With such kinetics, the time constant of the channel changes monotonically and goes to infinity for large depolarizations. Moreover, the steady-state activation profiles of the original potassium channel indicate opening of the potassium channel during large hyperpolarization. These ion channel dynamics conflict with known physical principles that govern ion channels (
                      - link "Hille, 2001" [ref=e3354] [cursor=pointer]:
                        - /url: "#"
                      - text: ), and, to our knowledge, they have not been reported experimentally. Therefore, we adjusted the functional form of the kinetics for the slow potassium channel. Our modified axon model was able to reproduce experimental results, such as action potential and afterpotential shape, axonal excitability and the recovery cycle, impulse-dependent afterhyperpolarization, and spike frequency adaptation.
                  - generic [ref=e3355]:
                    - heading "Morphology" [level=4] [ref=e3356]
                    - paragraph [ref=e3357]:
                      - text: We used the same morphology as the original compartmental model of a myelinated mammalian axon for diameters of 5.7 – 16.0 um (
                      - link "McIntyre et al., 2002" [ref=e3359] [cursor=pointer]:
                        - /url: "#"
                      - text: ) and a subsequent study for an axon diameter of 2.0 μm (
                      - link "McIntyre et al., 2004" [ref=e3361] [cursor=pointer]:
                        - /url: "#"
                      - text: ). The model morphology accounts for various sections of myelin along the internode by including myelin attachment segment (MYSA), paranode main segment (FLUT), and internode segment (STIN) regions of the fiber. Because the nervous system consists of axons with a wide range of diameters (
                      - link "Benavides-Piccione et al., 2020" [ref=e3363] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Feirabend et al., 2002" [ref=e3365] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Terao et al., 1994" [ref=e3367] [cursor=pointer]:
                        - /url: "#"
                      - text: ;
                      - link "Ugrenović et al., 2016" [ref=e3369] [cursor=pointer]:
                        - /url: "#"
                      - text: ), we investigated the axonal response to TI stimulation for a range of fiber sizes (
                      - link "Figure S5" [ref=e3370] [cursor=pointer]:
                        - /url: "#mmc1"
                      - text: "). We performed simulations for the following fiber diameters: 2.0, 3.0, 5.7, 8.7, 11.5, and 16.0 μm. Unless otherwise noted, we simulated axons with a diameter of 8.7 μm and a length of 100 mm."
