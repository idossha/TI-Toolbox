                    - paragraph [ref=e310]: Thus, TIS differs from AM-tACS, which has a constant carrier frequency.
                    - paragraph [ref=e311]:
                      - text: The peak of the low frequency envelope can be out of phase by 180° and the high frequency oscillations have different phase shifts throughout their common low frequency period at different cortical locations, depending on the alignment of the E-fields and their amplitude ratio (
                      - link "Figure 1A" [ref=e312] [cursor=pointer]:
