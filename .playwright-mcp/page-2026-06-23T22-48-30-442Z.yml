                    - text: ","
                    - link "29" [ref=e477] [cursor=pointer]:
                      - /url: "#R29"
                    - text: "]. The kHz tACS thresholds all fell within a similar range (75 V/m to 230 V/m) despite some variation in their distributions for different E-field orientations. The threshold for a stimulation modality corresponded to the lower range of the distributions (~ 75 V/m to 100 V/m), because for the large and dense population of cortical neurons represented by the randomly-rotated model cells, there were always some neurons that exhibited the lowest threshold. The thresholds were similar to TMS thresholds ["
                    - link "32" [ref=e478] [cursor=pointer]:
