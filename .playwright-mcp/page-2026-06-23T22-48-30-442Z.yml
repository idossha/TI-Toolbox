                      - paragraph [ref=e288]:
                        - text: Characteristic of the total TIS E-field of two aligned (blue and black) or anti-aligned (orange) E-fields with various amplitude ratios. The channels have relatively low frequencies (295 Hz and 305 Hz) for better visualization.
                        - strong [ref=e289]: A.
                        - text: For aligned E-fields (blue and black), the high frequency oscillations of the total E-fields (normalized) are in-phase only at the peaks of their envelopes and shift out of phase at the troughs. For anti-aligned fields (orange), the envelopes themselves are 180° out-of-phase compared to the those of aligned E-fields (blue or black), whereas the carrier could be in-phase at a peak/trough (orange and blue, in-phase at
                        - emphasis [ref=e290]: t
                        - text: ≈120 ms) or in between peak and trough (red and black, in-phase at
                        - emphasis [ref=e291]: t
                        - text: ≈40 ms). Such phase differences can result in asynchronous neural activation across different cortical locations.
                        - strong [ref=e292]: B.
                        - text: The carrier frequency of the total TIS E-field includes low frequency jitter around the frequency of the E-field with larger amplitude, unlike constant-frequency AM-tACS.
                    - paragraph [ref=e293]: The TIS waveform’s carrier frequency
                    - table [ref=e294]:
