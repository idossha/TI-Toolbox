                    - text: ), as expected due to the low-pass filtering by the neuronal membrane [
                    - link "24" [ref=e475] [cursor=pointer]:
                      - /url: "#R24"
                    - text: ","
                    - link "25" [ref=e476] [cursor=pointer]:
