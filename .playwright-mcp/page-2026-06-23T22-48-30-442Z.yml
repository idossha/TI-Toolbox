                  - paragraph [ref=e558]:
                    - text: Block thresholds had a wide distribution (
                    - link "Figure 10" [ref=e559] [cursor=pointer]:
                      - /url: "#F10"
                    - text: ) and were strongly dependent on E-field orientation (
                    - link "Figures S10" [ref=e560] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: "-"
                    - link "S13" [ref=e561] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: ). Block thresholds for TIS decreased with increasing E-field amplitude ratio, and, except for 4:1, were higher compared to those of HFS and RFS. For TIS with equal E-field amplitudes, neurons were more likely to be exposed to a total E-field with stronger low-frequency modulation (
                    - link "Figure 4A" [ref=e562] [cursor=pointer]:
                      - /url: "#F4"
                    - text: ), which generated periodic onset and offset responses interrupting the block. On the other hand, for unequal E-field amplitudes, the modulation was weaker and therefore could achieve block at lower thresholds. Block thresholds for RFS increased with amplitude ratio and were similar to those of HFS. For RFS, equal E-field amplitude exposed more axon terminals to higher aligned E-fields at the kHz frequency, resulting in block at lower thresholds. In contrast, some axon terminals were aligned with the weaker E-fields of the unequal E-fields, resulting in higher block thresholds.
              - generic [ref=e563]:
                - heading "4. Discussion" [level=2] [ref=e564]: 4. Discussion
                - generic [ref=e565]:
                  - heading "4.1. Characteristics of TIS" [level=3] [ref=e566]
                  - paragraph [ref=e567]:
                    - text: We quantified the activation and block of model cortical neurons by single channel tACS and by methods for modifying the spatial selectivity of tACS using two high-frequency currents to generate E-field temporal interference with two closely spaced frequencies or E-field rotation through relative phase shift without or with amplitude modulation. TIS evoked periodic activation of the model neurons at the difference frequency of the two stimulation currents, similar to prior results [
                    - link "16" [ref=e568] [cursor=pointer]:
                      - /url: "#R16"
                    - text: "]. However, unlike the experimental results, TIS thresholds were comparable to those of HFS, as well as those of RFS or their AM versions. The E-field amplitudes to achieve activation of model neurons with all forms of kHz tACS (75 to 230 V/m) were much higher than the range for LFS (16.9 to 47.4 V/m). At markedly higher amplitudes (> 1700 V/m), neuronal responses and endogenous activity could be blocked by non-modulated kHz tACS, including TIS. While TIS did generate amplitude modulation of the total E-field projected locally along the neural elements, the depth of modulation and magnitude of the modulated waveform were highly dependent on the amplitude ratio of the two E-fields as well as their orientations with respect to the neural element. Therefore, the E-field projected on the neural elements has smaller magnitude and shallower modulation compared to the maximum values determined by the TIS E-fields alone. Consequently, TIS generates conduction block similarly to regular kHz stimulation without modulation, whereas AM-tACS with maximum modulation depth did not generate block for any E-field direction."
                  - paragraph [ref=e569]:
                    - text: Our study related neuronal responses to the strength and temporal characteristics of the local E-field. To link the transcranial stimulus current with the E-field, Rampersad et al. [
                    - link "36" [ref=e570] [cursor=pointer]:
                      - /url: "#R36"
                    - text: "] simulated the E-field in a mouse brain with a model representing the conditions of the original study ["
                    - link "16" [ref=e571] [cursor=pointer]:
                      - /url: "#R16"
                    - text: "]. They reported a TIS E-field maximum of 383 V/m, higher than the threshold E-field values in our study. However, their E-field was defined for the amplitude of the envelope along the orientation of maximum modulation ["
                    - link "16" [ref=e572] [cursor=pointer]:
                      - /url: "#R16"
                    - text: ","
                    - link "36" [ref=e573] [cursor=pointer]:
                      - /url: "#R36"
                    - text: "]"
                  - table [ref=e574]:
                    - rowgroup [ref=e575]:
                      - row [ref=e576]:
                        - cell [ref=e577]
                  - paragraph [ref=e578]:
                    - text: where
                    - emphasis [ref=e579]: β
                    - text: ∈ [0,
                    - emphasis [ref=e580]: π
                    - text: "] is the angle between the two E-fields and"
                    - text: are unit vectors along the E-fields. The E-field along the maximum modulation orientation does not reflect the maximum E-field, max∣
                    - strong [ref=e581]:
                      - emphasis [ref=e582]: E
                    - subscript [ref=e583]: TIS
                    - text: (
                    - emphasis [ref=e584]: t
                    - text: )∣, over an entire low frequency period of TIS and, in general, is smaller than the latter (
                    - link "Figure 1B" [ref=e585] [cursor=pointer]:
                      - /url: "#F1"
                    - text: ). A metric comparable to our reported thresholds is the maximum E-field amplitude of conventional two-channel tACS with the same combination of E-field orientations and amplitude ratio, which was 38,000 V/m [
                    - link "36" [ref=e586] [cursor=pointer]:
                      - /url: "#R36"
                    - text: "]. This value is much higher than our activation thresholds and an order of magnitude higher than the conduction block thresholds. The model by Rampersad et al. did not include the skin, and such a high E-field amplitude compared to other studies ["
                    - link "38" [ref=e587] [cursor=pointer]:
                      - /url: "#R38"
                    - text: "] may be attributed to the absence of current shunting by conductive soft tissues ["
                    - link "7" [ref=e588] [cursor=pointer]:
                      - /url: "#R7"
                    - text: "]. Nevertheless, even if Rampersad et al. overestimated the E-field by tenfold, our simulation results indicate that TIS applied epicranially to mice could achieve conduction block in cortical neurons, similar to previous computational studies that examined the effects of TIS on peripheral axons ["
                    - link "25" [ref=e589] [cursor=pointer]:
                      - /url: "#R25"
                    - text: "]. Therefore, the periodic activation observed"
                    - emphasis [ref=e590]: in vivo
                    - text: in mouse experiments may reflect onset responses of nerve block in the target region where the two E-fields have similar amplitudes. The block was released periodically in the target region due to amplitude modulation of the TIS E-field, whereas the surrounding area was completely blocked due to much smaller modulation depth.
                  - paragraph [ref=e591]:
                    - text: In humans, however, tolerable tACS currents for scalp stimulation without anesthesia are only a few mA and generate E-fields in the brain of only 0.1 V/m to 1 V/m [
                    - link "8" [ref=e592] [cursor=pointer]:
                      - /url: "#R8"
                    - text: ","
                    - link "39" [ref=e593] [cursor=pointer]:
                      - /url: "#R39"
                    - text: "]. While these E-field amplitudes are sufficient to modulate neural activity ["
                    - link "17" [ref=e594] [cursor=pointer]:
                      - /url: "#R17"
                    - text: ","
                    - link "55" [ref=e595] [cursor=pointer]:
                      - /url: "#R55"
                    - text: "-"
                    - link "57" [ref=e596] [cursor=pointer]:
                      - /url: "#R57"
                    - text: "], they are orders of magnitude smaller than both activation and block thresholds of TIS. Our modeling results indicate that suprathreshold TIS would require E-fields in the range from 150 V/m to 800 V/m, corresponding to scalp electrode current of hundreds of mA to over 1 A, which is comparable to or exceeds that in electroconvulsive therapy (ECT) ["
                    - link "58" [ref=e597] [cursor=pointer]:
                      - /url: "#R58"
                    - text: ","
                    - link "59" [ref=e598] [cursor=pointer]:
                      - /url: "#R59"
                    - text: "]. Therefore, the generation of suprathreshold TIS effects would be intolerable without anesthesia, could result in heating at the electrode–scalp interface, and may induce a seizure with continuous application. Nevertheless, subthreshold TIS ["
                    - link "31" [ref=e599] [cursor=pointer]:
                      - /url: "#R31"
                    - text: ","
                    - link "33" [ref=e600] [cursor=pointer]:
                      - /url: "#R33"
                    - text: "], which involves very different mechanisms, may still merit investigation due to the unique properties of the TIS E-field. Likewise, TIS could be of interest in suprathreshold applications under anesthesia in the context of ECT or intensive nonconvulsive stimulation ["
                    - link "60" [ref=e601] [cursor=pointer]:
                      - /url: "#R60"
                    - text: "] as well as for invasive stimulation ["
                    - link "61" [ref=e602] [cursor=pointer]:
                      - /url: "#R61"
                    - text: "]."
                  - paragraph [ref=e603]:
                    - text: Our results revealed complexities of the E-fields produced by TIS and RFS that have implications for the design and interpretation of modeling and experimental studies. The activation and block thresholds for the E-fields of these non-static stimulation methods varied not only with their amplitude ratio and angle but also with their orientations relative to the neuron morphology. For example,
                    - strong [ref=e604]:
                      - emphasis [ref=e605]: E
                    - subscript [ref=e606]: "1"
                    - text: and
                    - emphasis [ref=e607]:
                      - strong [ref=e608]: E
                    - subscript [ref=e609]: "2"
                    - text: with polar angles (
                    - emphasis [ref=e610]: θ
                    - subscript [ref=e611]: "1"
                    - text: and
                    - emphasis [ref=e612]: θ
                    - subscript [ref=e613]: "2"
                    - text: ) and covarying azimuths (
                    - emphasis [ref=e614]: ϕ
                    - subscript [ref=e615]: "1"
                    - text: –
                    - emphasis [ref=e616]: ϕ
                    - subscript [ref=e617]: "2"
                    - text: = constant) span a fixed angle, but the thresholds vary substantially (
                    - link "Figure S6" [ref=e618] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: "-"
                    - link "S8" [ref=e619] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: and
                    - link "S12" [ref=e620] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: "-"
                    - link "S13" [ref=e621] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: ). Therefore, the E-fields obtained along specific directions in computational models, whether for maximum modulation [
                    - link "15" [ref=e622] [cursor=pointer]:
                      - /url: "#R15"
                    - text: "] or in a pre-determined orientation ["
                    - link "16" [ref=e623] [cursor=pointer]:
                      - /url: "#R16"
                    - text: ","
                    - link "36" [ref=e624] [cursor=pointer]:
                      - /url: "#R36"
                    - text: ","
                    - link "37" [ref=e625] [cursor=pointer]:
                      - /url: "#R37"
                    - text: "], cannot predict the stimulation effects of TIS, and optimization using calculation of the E-field alone ["
                    - link "35" [ref=e626] [cursor=pointer]:
                      - /url: "#R35"
                    - text: ","
                    - link "62" [ref=e627] [cursor=pointer]:
                      - /url: "#R62"
                    - text: "] is unlikely to produce the same results as when considering the response of the neurons to those E-fields."
                  - paragraph [ref=e628]:
                    - text: Further, TIS has unique features compared to the other kHz stimulation methods that were analyzed. TIS creates amplitude modulation in regions where the two E-field amplitudes are similar, which generally correspond to the stimulation target. The slight differences between the TIS waveforms for aligned E-fields compared to that of a single channel kHz AM-tACS could have non-negligible effects on neural activation. TIS also creates a rotational E-field where the two E-field orientations are not directly aligned, and this generally includes the target region as the two pairs of electrodes are placed on opposite sides of the head. Design or optimization of electrode montages that exploit non-static fields [
                    - link "15" [ref=e629] [cursor=pointer]:
                      - /url: "#R15"
                    - text: ","
                    - link "62" [ref=e630] [cursor=pointer]:
                      - /url: "#R62"
                    - text: "] could benefit from including field rotation. In contrast, the E-field of conventional AM-tACS contains no rotation and would only engage a subset of the neural targets recruited by TIS, despite being able to achieve larger modulation depths for a given orientation ["
                    - link "15" [ref=e631] [cursor=pointer]:
                      - /url: "#R15"
                    - text: "]. The rotation of TIS is emergent due to the varying phase difference during the low frequency cycle, whereas the magnitude of rotation of RFS is sensitive to the phase difference between the waveforms applied at the two pairs of electrodes. The total TIS E-field is mostly oscillatory with minimal rotation and amplitude modulation when one E-field has much larger amplitude than the other, which typically occurs in regions outside the target. This results in similar activation thresholds to HFS and could result in conduction block at high field amplitudes, where higher amplitude ratios would confer lower block thresholds than in the target region. Of the methods capable of producing conduction block, TIS also has the highest block thresholds. AM-HFS and AM-RFS cannot achieve conduction block, whereas RFS achieves block at lower thresholds for equal E-field amplitudes compared to unequal amplitudes. On the network level, the asynchronous variation of the TIS E-field over space should be considered ["
                    - link "44" [ref=e632] [cursor=pointer]:
                      - /url: "#R44"
                    - text: "]. Therefore, experiments such as brain slice studies should consider replicating the features of the TIS E-field with either two stimulation channels or a simultaneously amplitude- and frequency-modulated E-field, rather than substituting it with a single-frequency AM E-field ["
                    - link "33" [ref=e633] [cursor=pointer]:
                      - /url: "#R33"
                    - text: "]."
                - generic [ref=e634]:
                  - heading "4.2. Filtering of transmembrane potentials" [level=3] [ref=e635]
                  - paragraph [ref=e636]: We analyzed the neuronal responses based on the raw transmembrane potential recordings to determine activation thresholds. At threshold E-field amplitudes, the kHz oscillations of transmembrane potential had limited amplitudes (5 mV to 15 mV) throughout the cell and did not mask the action potentials. Thus, spike analysis for determination of activation thresholds did not require filtering. For conduction block, the transmembrane potential could be driven beyond 0 mV (or another arbitrarily defined threshold) by kHz waveforms at high amplitudes. These high amplitude oscillations are “real” and not artifacts, making it difficult to distinguish action potentials which ride on top of or are merged with these oscillations. Spikes could nevertheless be identified by temporal or frequency features, because the transmembrane potential oscillations were sinusoidal and removed by filtering, while spikes resulted in distortions that remained after filtering.
                  - paragraph [ref=e637]:
                    - text: In experimental studies of neural stimulation, electrophysiological recordings are contaminated by stimulus artifacts, e.g., the kHz extracellular E-field in TIS. Not only is filtering often necessary as a post-processing step, multiple filters are integral components of the experimental rig before the data are sampled [
                    - link "63" [ref=e638] [cursor=pointer]:
                      - /url: "#R63"
                    - text: "]. In ["
                    - link "16" [ref=e639] [cursor=pointer]:
                      - /url: "#R16"
                    - text: "], the current clamp traces were band-stop filtered (1 kHz and 15 kHz) and high-pass filtered (100 Hz). While the neurons themselves were unlikely to fire at frequencies over 100 Hz in response to stimulation, it was unclear whether the filtering resulted in the loss of some spikes during kHz frequency stimulation and TIS. It appears that spikes could be identified from TIS and HFS only when the artifact amplitude was relatively small and spikes were visible even in the unfiltered traces, i.e., during the initial ramp-up of both TIS and HFS and during each ramp-up of the low frequency envelope of the TIS waveform ["
                    - link "16" [ref=e640] [cursor=pointer]:
                      - /url: "#R16"
                    - text: "]. During the steady state of HFS and near the peak of the low frequency envelope of TIS, spikes that were overwhelmed by the artifact may have been lost due to filtering, leading to a conclusion that there was no response to HFS. As such, alternate artifact removal strategies could be pursued, such as subtraction of an artifact template, or using an ideal notch filter in the frequency domain. Neuronal models are not limited by such artifacts and allow direct access to the transmembrane potential. While advantageous for data analysis, filtering of simulated transmembrane potentials should be performed with caution as it complicates the interpretation of modeling results and their comparison with experimental studies."
                - generic [ref=e641]:
                  - heading "4.3. Limitations" [level=3] [ref=e642]
                  - paragraph [ref=e643]:
                    - text: Our simulations examined the neuronal response to uniform E-fields under the quasi-uniform approximation for transcranial stimulation. Due to this simplification, the thresholds could not be directly correlated with current amplitudes applied to tACS electrodes, and the spatial distribution of neural activation within the cortex was not determined. Nevertheless, simulations of E-field distributions in realistic head models can fill this gap, whether using a multiscale model with neuron models embedded in the cortex [
                    - link "32" [ref=e644] [cursor=pointer]:
                      - /url: "#R32"
                    - text: "] or using the uniform field results as a lookup table to determine thresholds based on the amplitude ratio and orientations of the cortical E-fields relative to the normal direction of the cortical layer ["
                    - link "42" [ref=e645] [cursor=pointer]:
                      - /url: "#R42"
                    - text: ","
                    - link "64" [ref=e646] [cursor=pointer]:
                      - /url: "#R64"
                    - text: "]. Therefore, the combinations of E-field orientation and their amplitude ratios in this study are representative of neurons at different cortical locations."
                  - paragraph [ref=e647]:
                    - text: Despite their realistic morphologies and complexity of ion channels, the model neurons have limitations capturing the response to high frequency stimulation. The Blue Brain neuron models have truncated main axons due to the slicing process and do not include the descending axon in the white matter. Mid-axon activation of white matter fibers—thought to generate direct waves in TES at high amplitudes—could contribute to the response to TIS [
                    - link "25" [ref=e648] [cursor=pointer]:
                      - /url: "#R25"
                    - text: "]. However, such responses have similar patterns and characteristics compared to those observed in our study and would occur at higher amplitudes as the axon terminals are the lowest-threshold sites of action potential initiation due to their sensitivity to exogenous E-fields ["
                    - link "43" [ref=e649] [cursor=pointer]:
                      - /url: "#R43"
                    - text: ","
                    - link "53" [ref=e650] [cursor=pointer]:
                      - /url: "#R53"
                    - text: "]. Further, channel conductances and dynamics are not readily available for the axonal arbor beyond the initial segment and have to be inferred from the parameters of the initial segment. This may contribute to simulated transcranial stimulation thresholds being on average about two fold higher than experimental data, although the simulated and experimental threshold distributions overlap ["
                    - link "32" [ref=e651] [cursor=pointer]:
                      - /url: "#R32"
                    - text: "]. The sodium channel dynamics were fitted to recordings from patch clamp recording ["
                    - link "65" [ref=e652] [cursor=pointer]:
                      - /url: "#R65"
                    - text: "], which could underestimate the kinetics of axonal sodium channels due to filtering (2 kHz low pass filter) and recording below body temperature (24°C). We accelerated the fast sodium channels that contribute the most to action potential firing to capture better the response to kHz stimulation; however, further improvements are required to increase the accuracy of cortical neuron models. Nevertheless, analyses of transcranial stimulation should use cortical neuron models with realistic myelinated axonal morphology at body temperature, and classic Hodgkin-Huxley channels ["
                    - link "66" [ref=e653] [cursor=pointer]:
                      - /url: "#R66"
                    - text: ","
                    - link "67" [ref=e654] [cursor=pointer]:
                      - /url: "#R67"
                    - text: "] are ill suited to studies of transcranial stimulation in mammals."
                  - paragraph [ref=e655]:
                    - text: We did not include intrinsic activity or network connectivity in this study. Although patch clamp recordings in the anesthetized mice exhibited negligible spontaneous firing (< 0.5 Hz) [
                    - link "16" [ref=e656] [cursor=pointer]:
                      - /url: "#R16"
                    - text: "], intrinsic subthreshold fluctuation of the transmembrane potential could have interacted with the exogenous E-field. However, threshold changes for stimulation during the afterpolarization of an action potential are on the order of ±50% ["
                    - link "68" [ref=e657] [cursor=pointer]:
                      - /url: "#R68"
                    - text: "], and therefore transmembrane potential fluctuations alone are unlikely to account for the discrepancy of threshold differences between LFS and kHz tACS when comparing the experiments and our simulations."
                  - paragraph [ref=e658]:
                    - text: As our goal was to explore the hypothesis of single-neuron demodulation of TIS, we did not include synaptic connections between neurons, and network modulation could be a potential mechanism for TIS. While network activation can be advantageous, it could also be considered a limiting factor on the focality of transcranial stimulation methods, including TIS. For example, Grossman et al. [
                    - link "16" [ref=e659] [cursor=pointer]:
                      - /url: "#R16"
                    - text: "] used c-Fos immunochemistry to demonstrate activation of the hippocampus without activating superficial cortical areas, showing strong c-Fos immunoreactivity in the entire region of granule cells within the dentate gyrus. This expression was much stronger than observed anywhere for LFS or elsewhere in TIS, suggesting that TIS achieved strong synchronous activation of the local circuitry in the dentate gyrus that could potentially be a result of a focal seizure. Furthermore, the area of activation inferred from the immunohistochemistry does not correlate with the distribution of the simulated E-field modulation envelope amplitude ["
                    - link "16" [ref=e660] [cursor=pointer]:
                      - /url: "#R16"
                    - text: "], complicating the interpretation of the mechanism and focality of TIS. While these limitations are important directions for future refinement of the models, they would affect similarly TIS and the other forms of kHz stimulation. Therefore, our conclusions regarding the relative effects and thresholds across these modalities appear unlikely to be altered."
              - generic [ref=e661]:
                - heading "5. Conclusions" [level=2] [ref=e662]: 5. Conclusions
                - paragraph [ref=e663]: We analyzed the E-field characteristics of TIS and quantified the responses of model cortical neurons to suprathreshold TIS and related kHz tACS modalities. The analysis revealed unique spatiotemporal characteristics of the TIS E-field, including phase-shift and frequency jitter of the TIS waveforms due to the difference in E-field amplitudes for aligned E-fields, as well as rotation of the total E-field for non-aligned E-fields. These findings highlight the importance of representing the TIS E-field in 3D and using morphologically-realistic neuron models. TIS had activation thresholds similar to other kHz tACS modalities and much higher than those of low frequency tACS. As expected, the bursts of activation evoked by near-threshold TIS were synchronized with the maxima of the low frequency modulation envelope of the total E-field, providing one possible mechanism for the previously reported experimental responses. Further, at amplitudes exceeding the activation threshold by an order of magnitude, TIS generated neuronal block, and in some cases the modulation of the total E-field generated periodic onset responses, providing an alternative mechanism for the experimental observations. Conduction block may also explain the lack of responses in off-target regions, where block can suppress endogenous brain activity. While the neuron models may overestimate absolute activation thresholds, the E-field thresholds for activation and block with TIS are, respectively, two and three orders of magnitude higher than the field strength than can be generated with tolerable levels of scalp stimulation. Therefore, administering suprathreshold TIS with transcranial electrical stimulation of the human brain appears infeasible without anesthesia and any TIS application should consider off-target effects of the carrier.
