          - region "Article content" [ref=e98]:
            - generic [ref=e99]:
              - generic [ref=e100]:
                - heading "Abstract" [level=2] [ref=e101]: Abstract
                - generic [ref=e102]:
                  - heading "Objective." [level=3] [ref=e103]
                  - paragraph [ref=e104]: Temporal interference stimulation (TIS) was proposed as a non-invasive, focal, and steerable deep brain stimulation method. However, the mechanisms underlying experimentally-observed suprathreshold TIS effects are unknown, and prior simulation studies had limitations in the representations of the TIS electric field (E-field) and cerebral neurons. We examined the E-field and neural response characteristics for TIS and related transcranial alternating current stimulation modalities.
                - generic [ref=e105]:
                  - heading "Approach." [level=3] [ref=e106]
                  - paragraph [ref=e107]: Using the uniform-field approximation, we simulated a range of stimulation parameters in biophysically realistic model cortical neurons, including different orientations, frequencies, amplitude ratios, amplitude modulation, and phase difference of the E-fields, and obtained thresholds for both activation and conduction block.
                - generic [ref=e108]:
                  - heading "Main results." [level=3] [ref=e109]
                  - paragraph [ref=e110]: For two E-fields with similar amplitudes (representative of E-field distributions at the target region), TIS generated an amplitude-modulated total E-field. Due to the phase difference of the individual E-fields, the total TIS E-field vector also exhibited rotation where the orientations of the two E-fields were not aligned (generally also at the target region). TIS activation thresholds (75–230 V/m) were similar to those of high-frequency stimulation with or without modulation and/or rotation. For E-field dominated by the high-frequency carrier and with minimal amplitude modulation and/or rotation (typically outside the target region), TIS was less effective at activation and more effective at block. Unlike amplitude-modulated high-frequency stimulation, TIS generated conduction block with some orientations and amplitude ratios of individual E-field at very high amplitudes of the total E-field (>1700 V/m).
                - generic [ref=e111]:
                  - heading "Significance." [level=3] [ref=e112]
                  - paragraph [ref=e113]: The complex 3D properties of the TIS E-fields should be accounted for in computational and experimental studies. The mechanisms of suprathreshold cortical TIS appear to involve neural activity block and periodic activation or onset response, consistent with computational studies of peripheral axons. These phenomena occur at E-field strengths too high to be delivered tolerably through scalp electrodes and may inhibit endogenous activity in off-target regions, suggesting limited significance of suprathreshold TIS.
                - paragraph [ref=e115]:
                  - strong [ref=e116]: "Keywords:"
                  - text: temporal interference stimulation, transcranial alternating current stimulation, kilohertz stimulation, computational simulation, neuron model
              - generic [ref=e117]:
                - heading "1. Introduction" [level=2] [ref=e118]: 1. Introduction
                - paragraph [ref=e119]:
                  - text: Transcranial electric or magnetic stimulation can modulate the activity of neurons in the brain non-invasively to treat neurological and psychiatric disorders [
                  - link "1" [ref=e120] [cursor=pointer]:
                    - /url: "#R1"
                  - text: "-"
                  - link "6" [ref=e121] [cursor=pointer]:
                    - /url: "#R6"
                  - text: "]. Compared to invasive methods, the electric field (E-field) distribution of transcranial stimulation is more diffuse and shallower due to the large distance between the stimulation sources and the brain and the high conductivity contrast between the tissue layers ["
                  - link "7" [ref=e122] [cursor=pointer]:
                    - /url: "#R7"
                  - text: "]. For transcranial electrical stimulation (TES), the typical cortical area activated or exposed to significant E-field strength (e.g., more than half the maximum E-field) is on the order of square centimeters ["
                  - link "8" [ref=e123] [cursor=pointer]:
                    - /url: "#R8"
                  - text: ","
                  - link "9" [ref=e124] [cursor=pointer]:
                    - /url: "#R9"
                  - text: "]. For magnetic stimulation (TMS), the fundamental depth-focality trade-off shows that activation of deep targets would result in widespread activation of more superficial brain regions ["
                  - link "10" [ref=e125] [cursor=pointer]:
                    - /url: "#R10"
                  - text: ","
                  - link "11" [ref=e126] [cursor=pointer]:
                    - /url: "#R11"
                  - text: "]. Efforts to improve the spatial characteristics such as focality and depth of conventional stimulation methods rely mostly on improved geometric design of the stimulation devices including electrode montages ["
                  - link "12" [ref=e127] [cursor=pointer]:
                    - /url: "#R12"
                  - text: "-"
                  - link "15" [ref=e128] [cursor=pointer]:
                    - /url: "#R15"
                  - text: "] and coil designs ["
                  - link "11" [ref=e129] [cursor=pointer]:
                    - /url: "#R11"
                  - text: "]."
                - paragraph [ref=e130]:
                  - text: Methods that use the temporal domain and intrinsic neuronal properties were proposed as a means to achieve more focal and/or deep transcranial electrical [
                  - link "16" [ref=e131] [cursor=pointer]:
                    - /url: "#R16"
                  - text: ","
                  - link "17" [ref=e132] [cursor=pointer]:
                    - /url: "#R17"
                  - text: "] or magnetic ["
                  - link "18" [ref=e133] [cursor=pointer]:
                    - /url: "#R18"
                  - text: "] stimulation. These methods use multiple stimulation channels, e.g., comprised of separate pairs of scalp electrodes, to generate individual E-fields in the head with different temporal waveforms. Temporal interference stimulation (TIS), originally referred to as interferential current therapy and applied as a neuromuscular treatment between the 1960s and 1990s ["
                  - link "19" [ref=e134] [cursor=pointer]:
                    - /url: "#R19"
                  - text: ","
                  - link "20" [ref=e135] [cursor=pointer]:
                    - /url: "#R20"
                  - text: "], was proposed for non-invasive brain stimulation ["
                  - link "16" [ref=e136] [cursor=pointer]:
                    - /url: "#R16"
                  - text: "]. In TIS, two high frequency (> 1 kHz) sinusoidal E-fields are applied with a slight frequency difference to create an amplitude-modulated (AM) total E-field through temporal interference. Borrowing terminology from radio technology, neurons are hypothesized to demodulate the low frequency (< 100 Hz) amplitude envelope of the summed E-field waveform via transmembrane current rectification arising from the nonlinear properties of ion channels. Under this assumption, activation would occur mostly in deeper brain regions where the E-field amplitudes of the stimulation channels are similar and therefore the modulation depth (i.e., extent of amplitude change due to the modulation) of the total E-field waveform is large. On the other hand, superficial brain areas would be unaffected, as the mismatch in E-field amplitudes generates a negligible low frequency envelope, and neurons are thought to be insensitive to the large amplitude kHz carrier signal. Without repositioning the electrodes, TIS could steer the site of stimulation by adjusting the relative amplitudes of each channel to shift the region where the E-fields generate the largest amplitude and/or modulation depth of interference ["
                  - link "16" [ref=e137] [cursor=pointer]:
                    - /url: "#R16"
                  - text: "]."
                - paragraph [ref=e138]:
                  - text: Grossman et al. [
                  - link "16" [ref=e139] [cursor=pointer]:
                    - /url: "#R16"
                  - text: "] reported experimental neuronal responses to TIS in the anesthetized mouse brain with current amplitude 2–5 times higher than the threshold for low frequency transcranial alternating current stimulation (tACS), whereas high frequency (kHz) tACS could not evoke responses even at seven times higher current amplitudes. However, the mechanism underlying these effects and the potential application to transcranial stimulation in humans remains unclear. One interpretation is that unmodulated kHz tACS does not significantly affect neurons, putatively due to low-pass filtering at the neuronal membrane, whereas the amplitude modulation exhibited by the summed TIS E-field generates low frequency transmembrane potentials that periodically activate the neurons. However, the neuronal membrane can respond to kHz stimuli since strength–duration time constants of the cortical response to transcranial stimulation are around 150–250 μs ["
                  - link "21" [ref=e140] [cursor=pointer]:
                    - /url: "#R21"
                  - text: "-"
                  - link "23" [ref=e141] [cursor=pointer]:
                    - /url: "#R23"
                  - text: "], and membrane filtering does not favor the modulated E-field because the neuronal membrane low-pass filters modulated and unmodulated kHz waveforms to a similar degree ["
                  - link "24" [ref=e142] [cursor=pointer]:
                    - /url: "#R24"
                  - text: ","
                  - link "25" [ref=e143] [cursor=pointer]:
                    - /url: "#R25"
                  - text: "]. Indeed, kHz stimulation can result in transient or sustained firing and, at higher amplitudes, neuronal activity block ["
                  - link "25" [ref=e144] [cursor=pointer]:
                    - /url: "#R25"
                  - text: "-"
                  - link "29" [ref=e145] [cursor=pointer]:
                    - /url: "#R29"
                  - text: "]. These responses to kHz stimulation cannot be ignored given that the unmodulated kHz E-field has a stronger absolute amplitude than the low frequency TIS modulation envelope. Even if the effects of the unmodulated kHz stimulus were not detected with specific measurements, this does not necessarily mean that neurons were not significantly impacted. It is possible, for example, that kHz neuronal block suppresses neural responses in regions away from the target ["
                  - link "25" [ref=e146] [cursor=pointer]:
                    - /url: "#R25"
                  - text: "]. Focality of activation can be achieved in such scenarios, but at the cost of affecting endogenous brain activity in non-target regions."
                - paragraph [ref=e147]:
                  - text: Several studies explored the mechanisms of TIS, but had limitations in their methods and were not designed to distinguish between the alternative mechanistic explanations outlined above. For example, the Grossman et al. [
                  - link "16" [ref=e148] [cursor=pointer]:
                    - /url: "#R16"
                  - text: "] study was in anesthetized mice, and while TIS did not appear to activate off-target brain regions, it is unclear whether it blocked or disrupted endogenous brain activity outside the target. Conduction block by TIS was observed in a model of peripheral nerve stimulation ["
                  - link "25" [ref=e149] [cursor=pointer]:
                    - /url: "#R25"
                  - text: "]; however, this and other computational studies of suprathreshold TIS focused on activation of isolated axons (fibers of passage) ["
                  - link "25" [ref=e150] [cursor=pointer]:
                    - /url: "#R25"
                  - text: ","
                  - link "30" [ref=e151] [cursor=pointer]:
                    - /url: "#R30"
                  - text: ","
                  - link "31" [ref=e152] [cursor=pointer]:
                    - /url: "#R31"
                  - text: "] and did not fully capture effects on cortical neurons. The combination of the two TIS current waveforms results in a three-dimensional (3D) time-varying E-field that can interact in complex ways with 3D cortical neurons ["
                  - link "32" [ref=e153] [cursor=pointer]:
                    - /url: "#R32"
                  - text: "], but the TIS E-fields and their effect on neurons were analyzed in one dimension (1D), either along the direction of largest modulation depth or in a predetermined direction such as the radial direction of the gray matter or along fiber bundles in the white matter ["
                  - link "15" [ref=e154] [cursor=pointer]:
                    - /url: "#R15"
                  - text: ","
                  - link "16" [ref=e155] [cursor=pointer]:
                    - /url: "#R16"
                  - text: ","
                  - link "25" [ref=e156] [cursor=pointer]:
                    - /url: "#R25"
                  - text: ","
                  - link "30" [ref=e157] [cursor=pointer]:
                    - /url: "#R30"
                  - text: ","
                  - link "31" [ref=e158] [cursor=pointer]:
                    - /url: "#R31"
                  - text: ","
                  - link "33" [ref=e159] [cursor=pointer]:
                    - /url: "#R33"
                  - text: "-"
                  - link "37" [ref=e160] [cursor=pointer]:
                    - /url: "#R37"
                  - text: "]. Some studies explored the modulation of ongoing cortical activity using TIS in the regime of subthreshold field strength of conventional tACS ["
                  - link "31" [ref=e161] [cursor=pointer]:
                    - /url: "#R31"
                  - text: ","
                  - link "33" [ref=e162] [cursor=pointer]:
                    - /url: "#R33"
                  - text: "]; however, they did not provide mechanistic information relevant to deep brain activation by TIS."
                - paragraph [ref=e163]:
                  - text: Translation of TIS from animal studies to clinical applications poses further challenges. With the same current amplitude, E-fields generated in the human brain are two orders-of-magnitude smaller than those in mice due to differences in head size and cortical geometry. Conventional tACS currents delivered via scalp electrodes are limited to a few mA to be tolerable without anesthesia, generating subthreshold E-fields on the order of only 0.1 to 1 V/m throughout the human brain [
                  - link "15" [ref=e164] [cursor=pointer]:
                    - /url: "#R15"
                  - text: ","
                  - link "36" [ref=e165] [cursor=pointer]:
                    - /url: "#R36"
                  - text: ","
                  - link "38" [ref=e166] [cursor=pointer]:
                    - /url: "#R38"
                  - text: ","
                  - link "39" [ref=e167] [cursor=pointer]:
                    - /url: "#R39"
                  - text: "]. Suprathreshold TIS in humans would therefore require much higher current amplitudes. Hence, estimation of TIS E-field thresholds is necessary to provide key information for determining the potential clinical utility of TIS."
                - paragraph [ref=e168]:
                  - text: The overall organization, goals, and conclusions of this paper are as follows. First, we analyzed the spatiotemporal characteristics of the TIS E-field in 3D, which have been overlooked in the literature (
                  - link "section 2.1" [ref=e169] [cursor=pointer]:
                    - /url: "#S7"
                  - text: ). The TIS E-field exhibited some unique properties including frequency jitter and field rotation that may influence neural activation. Second, we simulated activation of individual cortical neurons with TIS and several related tACS modalities (
                  - link "sections 2.2" [ref=e170] [cursor=pointer]:
                    - /url: "#S10"
                  - text: and
                  - link "3.1" [ref=e171] [cursor=pointer]:
                    - /url: "#S15"
                  - text: ). The E-field thresholds confirmed that suprathreshold TIS delivered with transcranial electrical stimulation would not be feasible in humans because of the high currents that need to be applied to the scalp. The results of related tACS modalities showed that some features of TIS were unique and not reproduced with amplitude modulation and/or field rotation of single-frequency stimulation. Third, we examined whether TIS, and related tACS modalities, could generate conduction block in cortical neurons, as was previously described for peripheral nerve stimulation [
                  - link "25" [ref=e172] [cursor=pointer]:
                    - /url: "#R25"
                  - text: "] ("
                  - link "sections 2.2" [ref=e173] [cursor=pointer]:
                    - /url: "#S10"
                  - text: and
                  - link "3.2" [ref=e174] [cursor=pointer]:
                    - /url: "#S16"
                  - text: ). The simulations showed that conduction block of ongoing neural activity can occur and onset response may contribute to or account for the periodic activation observed in TIS in rodents.
              - generic [ref=e175]:
                - heading "2. Methods" [level=2] [ref=e176]: 2. Methods
                - generic [ref=e177]:
                  - heading "2.1. Characteristics of TIS E-field" [level=3] [ref=e178]
