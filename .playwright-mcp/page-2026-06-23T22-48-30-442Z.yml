                      - text: ).
                  - generic [ref=e313]:
                    - heading "2.1.2. Non-aligned E-fields" [level=4] [ref=e314]
                    - paragraph [ref=e315]:
                      - text: For non-aligned E-fields, the total E-field must be considered in 3D, and not just along the direction of maximum modulation (
                      - link "Figure 2A" [ref=e316] [cursor=pointer]:
                        - /url: "#F2"
                      - text: ). In the plane spanned by the two E-field vectors, the total E-field traces out a Lissajous curve bounded by a parallelogram determined by the amplitude, orientation, and phase of the two E-fields (
                      - link "Figure 2B" [ref=e317] [cursor=pointer]:
                        - /url: "#F2"
                      - text: ). For E-fields with similar amplitudes and a large angle between them (e.g., 60°-120°), the total E-field alternates between oscillations and rotations at low frequency. The oscillation and rotation correspond to periods in time when the two E-fields are in-phase and out-of-phase and can be characterized by the ratio of the minimum and maximum E-field amplitude during one high frequency cycle.
                    - figure [ref=e318]:
                      - heading "Figure 2. Total TIS E-field consisting of two non-aligned E-fields exhibits field rotation." [level=5] [ref=e319]
                      - paragraph [ref=e320]:
                        - link "Figure 2. 🔍" [ref=e321] [cursor=pointer]:
                          - /url: https://www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html?title=Click%20on%20image%20to%20zoom&p=PMC3&id=9942661_nihms-1871080-f0002.jpg
                          - img "Figure 2." [ref=e322]
                          - text: 🔍
                      - link "Open in a new tab" [ref=e324] [cursor=pointer]:
                        - /url: figure/F2/
                      - paragraph [ref=e326]:
                        - text: Characteristics of two non-aligned E-fields with an amplitude ratio of 5:4 and a 75° angle.
                        - strong [ref=e327]: A
                        - text: Considering the E-fields in 3D reveals field rotation previously not considered. The two E-fields of TIS span a plane containing the direction of maximum modulation (Max. Mod., dashed line), which most studies use for analysis of stimulation characteristics, such as amplitude of envelope and modulation depth.
                        - strong [ref=e328]: B.
                        - text: The end point of the total E-field vector traces out a Lissajous curve, which alternates between oscillatory (blue) and rotational (red) periods. Here, oscillation and rotation are (arbitrarily) defined as the E-field magnitude having a ratio of minimum versus maximum smaller than 1/3 or larger than 2/3 during one high frequency cycle, respectively.
                        - strong [ref=e329]: C.
                        - text: The total E-field projected along any direction, for example the
                        - emphasis [ref=e330]: x
                        - text: "-axis ("
                        - emphasis [ref=e331]:
                          - strong [ref=e332]: E
                        - subscript [ref=e333]:
                          - emphasis [ref=e334]: x
                        - text: ", top row) or the direction of maximum modulation ("
                        - emphasis [ref=e335]:
                          - strong [ref=e336]: E
                        - subscript [ref=e337]: MM
                        - text: ", middle row), has a low frequency envelope (dashed lines). The oscillations, however, average out to zero (thick line) and therefore the waveform does not contain low frequency energy. In contrast, the E-field magnitude (bottom row) has low frequency content that could be a driving factor of TIS."
                        - strong [ref=e338]: D.
                        - text: "The corresponding spectrum of the E-fields in C. ℱ: Fourier transform. a.u.: arbitrary units."
                    - paragraph [ref=e339]:
                      - text: Unlike any 1D E-field projection that does not contain low-frequency content [
                      - link "25" [ref=e340] [cursor=pointer]:
                        - /url: "#R25"
                      - text: "], the amplitude of the rotating E-field does contain low-frequency power ("
                      - link "Figure 2C" [ref=e341] [cursor=pointer]:
                        - /url: "#F2"
                      - text: and
                      - link "2D" [ref=e342] [cursor=pointer]:
                        - /url: "#F2"
                      - text: ) and field rotation could contribute to stimulation by TIS. For example, multi-electrode tACS with phase-shift generates global traveling waves and local rotation for the E-field [
                      - link "44" [ref=e343] [cursor=pointer]:
                        - /url: "#R44"
                      - text: "], and rotational field TMS, applied using two perpendicular figure-of-eight coils driven with the same current waveforms with a 90° phase shift, exhibited lower thresholds and stronger evoked responses ["
                      - link "45" [ref=e344] [cursor=pointer]:
                        - /url: "#R45"
                      - text: "-"
                      - link "47" [ref=e345] [cursor=pointer]:
                        - /url: "#R47"
                      - text: "]. The rotational E-field is hypothesized to sweep across the neural population and activate neurons with different directional sensitivity ["
                      - link "45" [ref=e346] [cursor=pointer]:
                        - /url: "#R45"
                      - text: ","
                      - link "47" [ref=e347] [cursor=pointer]:
                        - /url: "#R47"
                      - text: "]."
                    - paragraph [ref=e348]: Given the large difference between the volumes of brain where the two TIS E-fields are (approximately) aligned versus not aligned, 1D parameters such as modulation depth, carrier frequency, and envelope do not encompass the full spectrum of TIS scenarios. Capturing the spatial variations in E-field dynamics within individual neurons in computational simulations requires neuronal models with realistic morphology instead of point neuron models. For a given amplitude ratio between the stimulation channels, only the ratio of the E-field amplitude can be specified for any neuron under the quasi-uniform approximation, and no single modulation depth can be defined because the waveform of the E-fields projected along the neural cables varies for different neuronal compartments.
                - generic [ref=e349]:
                  - heading "2.2. Neuronal response to TIS and other forms of tACS" [level=3] [ref=e350]
                  - generic [ref=e351]:
                    - heading "2.2.1. Stimulation waveforms" [level=4] [ref=e352]
                    - paragraph [ref=e353]:
                      - text: Three conventional (static) and three non-static tACS methods were studied (
                      - link "Figure 3" [ref=e354] [cursor=pointer]:
                        - /url: "#F3"
                      - text: ). The conventional methods comprising a single static E-field included 10 Hz low frequency stimulation (LFS), 2 kHz high frequency stimulation (HFS), and 2 kHz AM-HFS with 10 Hz modulation. Non-static methods included TIS (two E-fields with 2 kHz and 2.01 kHz frequency, respectively), rotational field HFS (RFS, two E-fields with 2 kHz frequency and a 90° phase shift) and AM-RFS (RFS with 10 Hz-modulated E-fields), which were all simulated with E-field amplitude ratios of 1:1, 2:1, 4:1. RFS was studied to examine how the field rotation alone affects tACS, and AM-RFS was included to examine how non-interference-generated AM compares with AM of TIS. The waveforms had a duration of 4 s and, to reduce onset response, 0.5 s and 0.25 s linear ramp-up and ramp-down at the beginning and end, respectively.
                    - figure "Illustration of the waveforms of low frequency stimulation (LFS), high frequency stimulation (HFS), amplitude-modulated HFS (AM-HFS), temporal interference stimulation (TIS), rotational field HFS (RFS), and amplitude-modulated RFS (AM-RFS). The waveforms of the conventional methods and the first E-field of non-static stimulation methods are shown in green, and the waveform of the second E-field of non-static stimulation methods are shown in purple. The envelope of all waveforms is shown with dashed lines and has a ramp-up and ramp-down period. The relative frequencies are for visualization and not to scale with the actual stimulation." [ref=e355]:
                      - heading "Figure 3. Stimulation waveforms of various tACS modalities." [level=5] [ref=e356]
                      - paragraph [ref=e357]:
                        - link "Figure 3. 🔍" [ref=e358] [cursor=pointer]:
                          - /url: https://www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html?title=Click%20on%20image%20to%20zoom&p=PMC3&id=9942661_nihms-1871080-f0003.jpg
                          - img "Figure 3." [ref=e359]
                          - text: 🔍
                      - link "Open in a new tab" [ref=e361] [cursor=pointer]:
                        - /url: figure/F3/
                      - paragraph [ref=e363]: Illustration of the waveforms of low frequency stimulation (LFS), high frequency stimulation (HFS), amplitude-modulated HFS (AM-HFS), temporal interference stimulation (TIS), rotational field HFS (RFS), and amplitude-modulated RFS (AM-RFS). The waveforms of the conventional methods and the first E-field of non-static stimulation methods are shown in green, and the waveform of the second E-field of non-static stimulation methods are shown in purple. The envelope of all waveforms is shown with dashed lines and has a ramp-up and ramp-down period. The relative frequencies are for visualization and not to scale with the actual stimulation.
                  - generic [ref=e364]:
                    - heading "2.2.2. Models of realistic neurons" [level=4] [ref=e365]
                    - paragraph [ref=e366]:
                      - text: To capture fully the effect of TIS, RFS, and AM-RFS on 3D cortical neurons, we used biophysically realistic neuron models from the Blue Brain project [
                      - link "48" [ref=e367] [cursor=pointer]:
                        - /url: "#R48"
                      - text: ","
                      - link "49" [ref=e368] [cursor=pointer]:
                        - /url: "#R49"
                      - text: "] that were previously adapted and validated for stimulation with extracellular E-fields ["
                      - link "32" [ref=e369] [cursor=pointer]:
                        - /url: "#R32"
                      - text: ","
                      - link "43" [ref=e370] [cursor=pointer]:
                        - /url: "#R43"
                      - text: "]. The models were implemented in the NEURON v7.4 ["
                      - link "50" [ref=e371] [cursor=pointer]:
                        - /url: "#R50"
                      - text: "] and included cell-type specific 3D dendritic and axonal morphologies reconstructed from juvenile rat brain slices and up to 13 Hodgkin-Huxley-like ion channel types. Key modifications included myelinating the axons, scaling ion channel kinetics to body temperature, and assigning ion channel properties to the entire axon arbor ["
                      - link "43" [ref=e372] [cursor=pointer]:
                        - /url: "#R43"
                      - text: "]. Layer 5 (L5) pyramidal cells (PC,"
                      - link "Figure 4A" [ref=e373] [cursor=pointer]:
                        - /url: "#F4"
                      - text: ) were simulated as they have the largest size and thus lowest thresholds in response to extracellular stimulation [
                      - link "32" [ref=e374] [cursor=pointer]:
                        - /url: "#R32"
                      - text: ","
                      - link "43" [ref=e375] [cursor=pointer]:
                        - /url: "#R43"
                      - text: "]. The main axon’s terminal was disabled from direct activation by extracellular stimulation to account for the truncation of the main axons in the slicing process and the artificial generation of low threshold sites ["
                      - link "32" [ref=e376] [cursor=pointer]:
                        - /url: "#R32"
                      - text: "]. To capture better the response to kHz stimulation and match more recent studies of axonal excitability ["
                      - link "51" [ref=e377] [cursor=pointer]:
                        - /url: "#R51"
                      - text: ","
                      - link "52" [ref=e378] [cursor=pointer]:
                        - /url: "#R52"
                      - text: "], the kinetics of the sodium channels were accelerated by uniformly scaling the time constants of the gating variables of the fast sodium channel ("
                      - emphasis [ref=e379]: m
                      - superscript [ref=e380]: "3"
                      - emphasis [ref=e381]: h
                      - text: ) by 0.4 for both the activation (
                      - emphasis [ref=e382]: m
                      - text: ) and inactivation (
                      - emphasis [ref=e383]: h
                      - text: ) gates. The overall effect was a faster firing rate in response to intracellular stimulation, and a decrease in thresholds to kHz stimulation (in the range of −20% to −12.5%) with limited effects on LFS (
                      - link "Figure S1" [ref=e384] [cursor=pointer]:
                        - /url: "#SD1"
                      - text: ). We conducted simulations of all stimulation parameters with one representative L5 PC model and confirmed that the findings are generalizable across cell morphologies using simulations of a subset of parameters in four additional model clones (
                      - link "Figure S2" [ref=e385] [cursor=pointer]:
                        - /url: "#SD1"
                      - text: ). We also tested the thresholds of a L2/3 PC model and a L4 large basket cell model (
                      - link "Figure S2" [ref=e386] [cursor=pointer]:
                        - /url: "#SD1"
                      - text: ), but we did not carry out more extensive characterization of these cell types since their thresholds were significantly higher than those of the L5 PCs for both low and high frequency stimulation.
