                    - text: ", and"
                    - link "S9" [ref=e498] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: ). For the majority of E-field orientations of HFS, TIS, and RFS, conduction block could occur during the stimulation steady state (
                    - link "Figures 10" [ref=e499] [cursor=pointer]:
                      - /url: "#F10"
                    - text: and
                    - link "S10" [ref=e500] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: "-"
                    - link "S14" [ref=e501] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: ). For all AM-HFS and AM-RFS cases, periodic activation at the frequency of amplitude modulation occurred for all suprathreshold E-field amplitudes. At low stimulation amplitudes, the activation coincided with the maxima of the AM envelope. At high amplitudes, however, the activation shifted to the minima of the envelope, indicating the activation was an onset/offset response separated by conduction block during periods of high E-field amplitude (
                    - link "Figure S14A" [ref=e502] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: and
                    - link "S14D" [ref=e503] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: "-"
                    - link "E" [ref=e504] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: ). Similarly, when sustained block was not observed for TIS, the bursts of firing were shifted by half the modulation period relative to the burst activation at lower field strengths, and the neural membrane was blocked between the onset and offset responses (
                    - link "Figures 9C" [ref=e505] [cursor=pointer]:
                      - /url: "#F9"
                    - text: ).
