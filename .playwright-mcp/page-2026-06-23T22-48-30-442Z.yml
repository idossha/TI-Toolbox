                  - heading "3.2. Firing pattern and threshold of conduction block" [level=3] [ref=e494]
                  - paragraph [ref=e495]:
                    - text: At sufficiently high E-field amplitudes, all kHz tACS modalities evoked a strong onset response during ramp up and an offset response during ramp down (
                    - link "Figures 8" [ref=e496] [cursor=pointer]:
                      - /url: "#F8"
                    - text: ","
