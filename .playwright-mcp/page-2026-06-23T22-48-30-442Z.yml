                  - generic [ref=e406]:
                    - heading "2.2.3. Simulation setup" [level=4] [ref=e407]
                    - paragraph [ref=e408]:
                      - text: Following the uniform E-field approximation discussed in
                      - link "Section 2.1" [ref=e409] [cursor=pointer]:
                        - /url: "#S7"
                      - text: ", the orientations of the E-fields were defined in a spherical coordinate system centered at the soma and with the polar direction ("
                      - emphasis [ref=e410]: z
                      - text: "-axis) aligned with the somatodendritic axis ("
                      - link "Figure 4A" [ref=e411] [cursor=pointer]:
                        - /url: "#F4"
                      - text: ) [
                      - link "43" [ref=e412] [cursor=pointer]:
                        - /url: "#R43"
                      - text: "]. These orientations can represent any possible cortical neuron locations for any E-field distribution, regardless of the electrode montage. Given the alignment of the somatodendritic axis with the cortical column, the polar angle reflects the orientation of the E-field relative to the cortical geometry and more significantly influences activation thresholds, whereas the azimuthal rotation of neuron models within the cortex are random ["
                      - link "32" [ref=e413] [cursor=pointer]:
                        - /url: "#R32"
                      - text: "]. To achieve a uniform representation on the spherical surface, the 32 E-field orientations were taken from a grid of seven non-uniformly sampled polar angles and six uniformly sampled azimuthal angles ("
                      - link "Figure 4B" [ref=e414] [cursor=pointer]:
                        - /url: "#F4"
                      - text: ). For stimulation methods comprising two E-fields, both fields were sampled with the 32 orientations, yielding a total of 1024 (32 × 32) orientation combinations for each parameter setting (i.e., frequency, amplitude modulation, phase shift, and amplitude ratio). NEURON’s extracellular mechanism [
                      - link "43" [ref=e415] [cursor=pointer]:
                        - /url: "#R43"
                      - text: ","
                      - link "50" [ref=e416] [cursor=pointer]:
                        - /url: "#R50"
                      - text: "] was used for coupling the E-fields to the models, with the extracellular potential"
                      - emphasis [ref=e417]: V
                      - subscript [ref=e418]: e
                      - text: for each compartment
                      - emphasis [ref=e419]: c
                      - text: calculated as
                    - table [ref=e420]:
                      - rowgroup [ref=e421]:
                        - row [ref=e422]:
                          - cell [ref=e423]
                    - paragraph [ref=e424]:
                      - text: where
                      - emphasis [ref=e425]:
                        - strong [ref=e426]: l
                      - subscript [ref=e427]:
                        - emphasis [ref=e428]: c
                      - text: is the displacement vector specifying the compartment location relative to the soma. The simulations were set up in MATLAB (versions 2019a and 2020a, The Mathworks, Natick, MA, USA) and performed in NEURON with a time step of 10 μs, which was sufficient to capture the approximately 0.5 ms period of the kHz stimulation and the response of the fast sodium channels with fastest time constant of ~ 40 μs.
                    - paragraph [ref=e429]:
                      - text: The threshold for activation was defined as a response with a firing rate of at least 9.5 Hz at the soma, which is 95% of the 10 Hz frequency of LFS, the difference frequency of TIS, or the frequency of the amplitude modulation (
                      - link "Figure 5A" [ref=e430] [cursor=pointer]:
                        - /url: "#F5"
                      - text: ). Bursting was defined as spiking events with less than 15 ms inter-spike intervals within a 50 ms duration [
                      - link "16" [ref=e431] [cursor=pointer]:
                        - /url: "#R16"
                      - text: "]; if bursting occurred, the bursts were counted instead of individual spikes to calculate the firing rate in the threshold search. Only spikes within the steady state period of the stimulation were counted, and onset or offset response during the ramp-up and ramp-down time was not considered for threshold determination. Therefore, a suprathreshold response should have at least 31 spikes or bursts during the steady state stimulation period. Setting the threshold firing rate to a slightly lower value allowed the activity in model neurons to mimic experimental recordings, in which some trials did not result in firing during every cycle of the LFS or TIS envelope ["
                      - link "16" [ref=e432] [cursor=pointer]:
                        - /url: "#R16"
                      - text: "]. Threshold amplitude was determined by a binary search to 1% accuracy and, for non-static stimulation methods, was defined as the maximum amplitude of the total E-field. To determine whether action potentials were initiated in the soma or axons, we compared the spike timing at the soma, axon initial segment, first node of the axon (directly connected to the initial segment), and terminal of the main axon."
                    - figure [ref=e433]:
                      - heading "Figure 5. Neural response and neural recording processing." [level=5] [ref=e434]
                      - paragraph [ref=e435]:
                        - link "Figure 5. 🔍" [ref=e436] [cursor=pointer]:
                          - /url: https://www.ncbi.nlm.nih.gov/core/lw/2.0/html/tileshop_pmc/tileshop_pmc_inline.html?title=Click%20on%20image%20to%20zoom&p=PMC3&id=9942661_nihms-1871080-f0005.jpg
                          - img "Figure 5." [ref=e437]
                          - text: 🔍
                      - link "Open in a new tab" [ref=e439] [cursor=pointer]:
                        - /url: figure/F5/
                      - paragraph [ref=e441]:
                        - strong [ref=e442]: A.
                        - text: Example response of L5 PC firing in response to TIS at threshold. The stimulation waveforms of the two E-fields are shown on top, followed by raster plots of firing and transmembrane potentials for the soma (black) and an axon node (red). Individual spikes or the first spike within a burst are aligned horizontally, with additional spikes within a burst offset vertically. The dotted vertical lines mark the start and end of the stimulation steady state period between 0.5 s and 3.75 s, and the horizontal dashed line marks the spike thresholds.
                        - strong [ref=e443]: B.
                        - text: Example response of L5 PC conduction block in response to TIS at high amplitude. Suprathreshold intracellular current pulses (blue) were applied to the soma and evoked action potentials at baseline. However, they did not evoke action potentials during the stimulation steady state, either in the raw (black) or filtered (grey) membrane potential. The membrane potential deflection in the soma generated by the test current pulse did not generate action potential in the axon (red traces). The dotted vertical lines mark the baseline period ending at 0.25 s and start and end of the stimulation’s steady state period between 1 s and 3.75 s.
                    - paragraph [ref=e444]:
                      - text: Thresholds for conduction block were determined to examine whether the non-static stimulation methods generated high frequency block in model cortical neurons, as was observed in models of peripheral axons [
                      - link "25" [ref=e445] [cursor=pointer]:
                        - /url: "#R25"
                      - text: "]. Suprathreshold test current pulses were injected into the soma to examine transmission of action potentials. The start of waveforms was therefore delayed by 0.25 s to allow test pulses to be applied during a baseline period. To accommodate the strong onset response, the steady state was considered to start 0.25 s after the amplitude ramp-up ended. Therefore, the period for which action potentials were considered for conduction block was 2.75 s, starting 1 s after the stimulus onset. The threshold search was terminated and “no block” was determined for a particular set of stimulation parameters when the maximum tested amplitude of the (first) E-field reached 6000 V/m and action potentials were still occurring during the steady state stimulation period. This upper limit was chosen as an arbitrarily high E-field value well above the stimulation threshold and about three times larger than the lowest block threshold observed in the simulations. To match the filtering that was applied to patch clamp recordings of cortical and hippocampal neurons ["
                      - link "16" [ref=e446] [cursor=pointer]:
                        - /url: "#R16"
                      - text: "], the membrane potential was filtered using a 5"
                      - superscript [ref=e447]: th
                      - text: order band stop filter (1 kHz to 15 kHz) and a 3
                      - superscript [ref=e448]: rd
                      - text: order high pass filter (100 Hz). This removed the stimulation “artifact” due to the high stimulation amplitude directly driving the neural membrane above the 0 mV threshold, revealing the underlying action potentials (
                      - link "Figure 5B" [ref=e449] [cursor=pointer]:
                        - /url: "#F5"
                      - text: ). Firing patterns were compared for both the raw and filtered transmembrane potential, with a 25 mV threshold used for the latter.
              - generic [ref=e450]:
                - heading "3. Results" [level=2] [ref=e451]: 3. Results
                - generic [ref=e452]:
                  - heading "3.1. Firing pattern and threshold of activation" [level=3] [ref=e453]
                  - paragraph [ref=e454]:
                    - text: For all tACS methods and across all E-field orientations or combinations of orientations, spiking events occurred earliest in the first node of the axon. As axon terminals had the lowest thresholds to extracellular stimulation [
                    - link "43" [ref=e455] [cursor=pointer]:
                      - /url: "#R43"
                    - text: ","
                    - link "53" [ref=e456] [cursor=pointer]:
                      - /url: "#R53"
                    - text: "], the responses were all initiated in the axonal arbor and propagated antidromically to the soma and re-orthodromically through the main axon ["
                    - link "32" [ref=e457] [cursor=pointer]:
                      - /url: "#R32"
                    - text: ","
                    - link "43" [ref=e458] [cursor=pointer]:
                      - /url: "#R43"
                    - text: "]."
                  - paragraph [ref=e459]:
                    - text: At threshold, the firing patterns evoked by all stimulation modalities showed a response before the E-field oscillations reached steady state amplitude (
                    - link "Figure 6" [ref=e460] [cursor=pointer]:
                      - /url: "#F6"
                    - text: ), and this was not eliminated by the ramp-up of the E-field magnitude(s). For LFS, AM-HFS, and AM-RFS, the responses during stimulation steady state were single spikes at regular intervals corresponding to the frequency of the stimulation or amplitude modulation. For HFS, TIS, and RFS, the bursts of activity before stimulation reached steady state appeared to be a transient onset response. During steady state stimulation, the HFS and RFS responses consisted of short patterns of two spikes that repeated regularly but did not satisfy the definition of bursts. The TIS responses exhibited regular firing at the difference frequency for most combinations of E-field orientation, and changing the amplitude ratio had negligible effect on the firing pattern. For some combinations of orientation, the firing pattern was irregular and exhibited bursts consisting exclusively of double spikes. For TIS with a 1:1 E-field amplitude ratio, bursting occurred in 229 of the 1024 combinations of orientation of the E-fields. In combinations where bursts occurred, bursting accounted for 3.2 ± 0.1% of firing events (mean ± standard deviation), whereas among firing events across all combinations of orientation, only 0.7% were bursts. Increasing the E-field amplitude ratio to 2:1 and 4:1 reduced both the number of combinations evoking bursting and the number of bursts (181, 3.2 ± 0.1%, and 0.6%, and 78, 3.3 ± 0.1%, and 0.2%, respectively). While only TIS evoked bursting at threshold, the neuron model could respond with bursting to suprathreshold stimulation amplitudes for all stimulation modalities (
                    - link "Figure S3" [ref=e461] [cursor=pointer]:
                      - /url: "#SD1"
                    - text: ).
