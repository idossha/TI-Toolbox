version: 2.1

executors:
  vm-docker:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true

commands:
  common-setup:
    steps:
      - checkout

  prepare-test-image:
    steps:
      - run:
          name: Pull TI-Toolbox test image
          command: |
            set -eo pipefail
            TEST_IMAGE="idossha/ti-toolbox-test:latest"
            echo "Pulling TI-Toolbox test image: ${TEST_IMAGE}"
            docker pull ${TEST_IMAGE}
            docker tag ${TEST_IMAGE} ti-test:latest

jobs:

  build-and-run-tests:
    executor: vm-docker
    steps:
      - common-setup
      - prepare-test-image

      - run:
          name: Run test suite with coverage
          no_output_timeout: 30m
          command: |
            set -euo pipefail
            TEST_IMAGE=ti-test:latest bash ./tests/test.sh --verbose --coverage

      - run:
          name: Prepare coverage for Codecov
          command: |
            set -euo pipefail

            if [ -z "${CODECOV_TOKEN:-}" ]; then
              echo "ERROR: CODECOV_TOKEN is not set. Add it in CircleCI project settings."
              exit 1
            fi

            COVERAGE_FILE="/tmp/coverage/coverage.xml"

            if [ ! -f "$COVERAGE_FILE" ] || [ ! -s "$COVERAGE_FILE" ]; then
              echo "ERROR: $COVERAGE_FILE not found or empty."
              exit 1
            fi

            # Rewrite <source> paths so Codecov maps files correctly.
            # pytest-cov inside Docker writes the Docker mount path as <source>.
            # Codecov needs an empty <source> with repo-relative filenames.
            python3 <<'PYEOF'
import sys
import xml.etree.ElementTree as ET

path = "/tmp/coverage/coverage.xml"
tree = ET.parse(path)
root = tree.getroot()

for source_el in root.iter("source"):
    source_el.text = ""

# Validate: no absolute paths should remain in filenames
errors = []
for cls in root.iter("class"):
    fn = cls.get("filename", "")
    if fn.startswith("/"):
        errors.append(fn)

if errors:
    print(f"ERROR: {len(errors)} file(s) have absolute paths:", file=sys.stderr)
    for e in errors[:5]:
        print(f"  {e}", file=sys.stderr)
    sys.exit(1)

tree.write(path, xml_declaration=True, encoding="UTF-8")
print(f"Coverage XML ready ({sum(1 for _ in root.iter('class'))} files)")
PYEOF

      - restore_cache:
          keys:
            - codecov-cli-v1

      - run:
          name: Upload coverage to Codecov
          command: |
            set -euo pipefail

            if [ ! -x /tmp/codecov ]; then
              echo "Downloading Codecov CLI..."
              curl -fsSL https://cli.codecov.io/latest/linux/codecov -o /tmp/codecov
              chmod +x /tmp/codecov
            fi

            /tmp/codecov --verbose upload-process \
              -t ${CODECOV_TOKEN} \
              -r idossha/TI-Toolbox \
              -C ${CIRCLE_SHA1} \
              -B ${CIRCLE_BRANCH} \
              --git-service github \
              -f /tmp/coverage/coverage.xml \
              --disable-search \
              -F unittests \
              -n "CircleCI-${CIRCLE_BUILD_NUM}" \
              -Z

      - save_cache:
          key: codecov-cli-v1
          paths:
            - /tmp/codecov

      - store_test_results:
          path: /tmp/test-results

      - store_artifacts:
          path: /tmp/test-results
          destination: test-results

      - store_artifacts:
          path: /tmp/coverage
          destination: coverage

workflows:
  test_workflow:
    jobs:
      - build-and-run-tests
