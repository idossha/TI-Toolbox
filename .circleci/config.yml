version: 2.1

executors:
  vm-docker:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: false

commands:
  common-setup:
    steps:
      - checkout

  prepare-test-image:
    steps:
      - run:
          name: Pull TI-Toolbox test image
          command: |
            set -eo pipefail
            TEST_IMAGE="idossha/ti-toolbox-test:latest"
            echo "Pulling TI-Toolbox test image: ${TEST_IMAGE}"
            docker pull ${TEST_IMAGE}
            docker tag ${TEST_IMAGE} ti-test:latest
            echo "✓ Test image ready (SimNIBS + testing tools)"

jobs:

  build-and-run-tests:
    executor: vm-docker
    steps:
      - common-setup
      - prepare-test-image
      - run:
          name: Run complete test suite with coverage
          no_output_timeout: 30m
          command: |
            set -euo pipefail

            echo "=========================================="
            echo "TI-Toolbox CI Testing Pipeline"
            echo "=========================================="
            echo "Testing PR code from: $(pwd)"
            echo "Test image: ti-test:latest"
            echo ""

            # Always run via the Docker wrapper to guarantee a consistent environment.
            # Use the already-pulled image tag to avoid re-pulling.
            TEST_IMAGE=ti-test:latest bash ./tests/test.sh --verbose --coverage

      - run:
          name: Upload coverage to Codecov
          command: |
            set -euo pipefail

            # Verify Codecov token is available
            if [ -z "${CODECOV_TOKEN:-}" ]; then
              echo "ERROR: CODECOV_TOKEN is not set! Add it in CircleCI project settings."
              exit 1
            fi

            # Fix source paths in coverage.xml so Codecov can match them.
            # Docker generates: <source>/ti-toolbox/tit</source> filename="calc.py"
            # Codecov needs:    <source>.</source>              filename="tit/calc.py"
            if [ -f /tmp/coverage/coverage.xml ]; then
              # 1. Strip the Docker mount prefix from all paths
              sed -i 's|/ti-toolbox/||g' /tmp/coverage/coverage.xml
              # 2. Set <source> to repo root and prefix filenames with tit/
              sed -i 's|<source>tit</source>|<source>.</source>|g' /tmp/coverage/coverage.xml
              sed -i 's|filename="|filename="tit/|g' /tmp/coverage/coverage.xml
              echo "Fixed coverage.xml: source=. filenames=tit/..."
              # Show a sample for debugging
              head -20 /tmp/coverage/coverage.xml
            fi

            # Diagnostics: verify coverage file exists and is non-empty
            echo "=== Codecov Upload Diagnostics ==="
            if [ -f /tmp/coverage/coverage.xml ]; then
              echo "coverage.xml exists"
              echo "File size: $(wc -c < /tmp/coverage/coverage.xml) bytes"
              echo "Line count: $(wc -l < /tmp/coverage/coverage.xml) lines"
              head -5 /tmp/coverage/coverage.xml
            else
              echo "ERROR: /tmp/coverage/coverage.xml not found!"
              exit 1
            fi
            echo "Commit SHA: ${CIRCLE_SHA1}"
            echo "Branch: ${CIRCLE_BRANCH}"
            echo "================================="

            # Download official Codecov CLI binary (recommended by Codecov docs)
            echo "Downloading Codecov CLI..."
            curl -fsSL https://cli.codecov.io/latest/linux/codecov -o /tmp/codecov
            chmod +x /tmp/codecov

            echo "Uploading coverage report to Codecov..."

            # upload-process combines create-commit + create-report + do-upload
            /tmp/codecov --verbose upload-process \
              -t ${CODECOV_TOKEN} \
              -r idossha/TI-Toolbox \
              -C ${CIRCLE_SHA1} \
              -B ${CIRCLE_BRANCH} \
              --git-service github \
              -f /tmp/coverage/coverage.xml \
              --disable-search \
              -F unittests \
              -n "CircleCI-${CIRCLE_BUILD_NUM}" \
              -Z
          when: always

      - store_test_results:
          path: /tmp/test-results

      - store_artifacts:
          path: /tmp/test-results
          destination: test-results

      - store_artifacts:
          path: /tmp/coverage
          destination: coverage


workflows:
  version: 2

  # Run on all branches including main
  # This ensures:
  # 1. Tests run on PRs (feature branches)
  # 2. Tests run on main branch for coverage tracking
  # 3. Codecov can track coverage trends over time
  test_workflow:
    jobs:
      - build-and-run-tests:
          filters:
            branches:
              # Run on all branches
              only: /.*/
