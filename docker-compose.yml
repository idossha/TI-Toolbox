services:

  freesurfer:
    image: idossha/ti-toolbox_freesurfer:v7.4.1
    platform: linux/amd64
    container_name: freesurfer_container
    volumes:
      - ti-toolbox_freesurfer_data:/usr/local/freesurfer/
    networks:
      - ti_network
    restart: unless-stopped

  simnibs:
    platform: linux/amd64
    image: idossha/simnibs:v2.3.0
    container_name: simnibs_container
    volumes:
      - ti-toolbox_freesurfer_data:/usr/local/freesurfer/
      - /tmp/.X11-unix:/tmp/.X11-unix:rw              # X11 socket mount for GUI
      - ${LOCAL_PROJECT_DIR}:/mnt/${PROJECT_DIR_NAME}
      - ${TIT_USER_CONFIG}:/root/.config/ti-toolbox    # User-level config (telemetry, prefs)
      - /var/run/docker.sock:/var/run/docker.sock     # Docker socket for DooD (QSIPrep/QSIRecon)
      - ${HOME}/.Xauthority:/root/.Xauthority:rw      # X11 auth for remote displays
    environment:
      USER: root
      DISPLAY: ${DISPLAY}
      FREESURFER_HOME: /usr/local/freesurfer
      SUBJECTS_DIR: /usr/local/freesurfer/subjects
      FS_LICENSE: /usr/local/freesurfer/license.txt
      LOCAL_PROJECT_DIR: ${LOCAL_PROJECT_DIR}
      PROJECT_DIR_NAME: ${PROJECT_DIR_NAME}
      TZ: ${TZ}
      TIT_HOST_OS: ${TIT_HOST_OS:-unknown}
      TIT_HOST_OS_VERSION: ${TIT_HOST_OS_VERSION:-unknown}
      TIT_HOST_ARCH: ${TIT_HOST_ARCH:-unknown}
      KMP_AFFINITY: "disabled"
      TI_TOOLBOX_VERSION: "v2.3.0"
    ports:
      - "8888:8888"
    networks:
      - ti_network
    depends_on:
      - freesurfer
    tty: true
    stdin_open: true
    working_dir: /ti-toolbox
    restart: unless-stopped
    command: ["tail", "-f", "/dev/null"]

networks:
  ti_network:
    driver: bridge

volumes:
  ti-toolbox_freesurfer_data:
    external: true
    name: ti-toolbox_freesurfer_data

