# Custom dsi_studio_gqi pipeline for TI-Toolbox.
# Produces tensor component maps (txx-tzz) for SimNIBS anisotropic modeling.
# Based on the upstream dsi_studio_gqi spec but WITHOUT the connectivity
# node, which avoids requiring --atlases and the plot_reports bug in
# QSIRecon >= 1.2.0.
name: dsistudio_gqi_scalar
nodes:
-   action: reconstruction
    input: qsirecon
    name: dsistudio_gqi
    parameters:
        method: gqi
    qsirecon_suffix: DSIStudio
    software: DSI Studio
-   action: export
    input: dsistudio_gqi
    name: scalar_export
    qsirecon_suffix: DSIStudio
    software: DSI Studio
-   action: tractography
    input: dsistudio_gqi
    name: tractography
    parameters:
        fiber_count: 5000000
        max_length: 250
        min_length: 30
        smoothing: 0.0
        step_size: 1.0
        turning_angle: 35
    software: DSI Studio
space: T1w
